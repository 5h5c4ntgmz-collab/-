<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>왁뿌볼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;900&display=swap');

:root{
  --bg: #f0fdf4;
  --surface: rgba(255,255,255,0.82);
  --accent1: #34d399;
  --accent2: #6ee7b7;
  --accent3: #a7f3d0;
  --lime: #bef264;
  --mint: #ccfbf1;
  --sky: #e0f2fe;
  --text: #064e3b;
  --subtext: #6ee7b7;
  --subtext-dark: #059669;
  --radius: 20px;
  --scene-size: min(260px, 58vw);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 90% 60% at 15% -5%, rgba(167,243,208,0.6), transparent),
    radial-gradient(ellipse 70% 50% at 85% 105%, rgba(190,242,100,0.35), transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(204,251,241,0.3), transparent);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  padding: 70px 0 16px;
}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 0;
  z-index:50;
}
.pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1.5px solid rgba(110,231,183,0.45);
  border-radius:999px;
  padding:6px 14px;
  font-weight:700;font-size:.82rem;color:var(--subtext-dark);
  box-shadow:0 2px 14px rgba(52,211,153,0.13);
}
.pill-val{font-size:1.05rem;color:var(--text);font-weight:900;}
.pill-fire{color:#f59e0b;}

/* ── TITLE ── */
.title-wrap{text-align:center;margin-bottom:clamp(12px,3vw,22px);}
h1{
  font-family:'Fredoka',sans-serif;
  font-size:clamp(1.5rem,5.5vw,2.4rem);
  color:var(--text);
  letter-spacing:0.5px;
  line-height:1;
  text-shadow: 0 2px 12px rgba(52,211,153,0.18);
}
.sub{
  font-size:clamp(.78rem,.8rem,.88rem);font-weight:700;
  color:var(--subtext-dark);
  margin-top:4px;
  letter-spacing:0.04em;
}

/* ── SCENE ── */
.scene{
  position:relative;
  width:var(--scene-size);height:var(--scene-size);
  cursor:pointer;touch-action:none;
  filter:drop-shadow(0 18px 36px rgba(52,211,153,0.28)) drop-shadow(0 4px 10px rgba(0,0,0,0.07));
  flex-shrink:0;
}
#cv{position:absolute;inset:0;width:100%;height:100%;}
#piecesDiv{position:absolute;inset:0;pointer-events:none;overflow:visible;}

/* hold ring */
#holdRing{
  position:absolute;
  top:-3.8%;left:-3.8%;
  width:107.6%;height:107.6%;
  pointer-events:none;
}

/* ── STATUS ── */
.status-wrap{margin-top:clamp(12px,2.5vw,20px);text-align:center;height:2rem;}
.status{
  font-size:clamp(.95rem,1.05rem,1.1rem);font-weight:800;
  color:var(--text);
  display:inline-block;
  transition:opacity .15s;
}
.hint{font-size:.76rem;color:var(--subtext-dark);margin-top:3px;font-weight:700;opacity:0.8;}

/* ── CONTROLS ── */
.controls{
  display:flex;gap:8px;margin-top:clamp(14px,3vw,22px);
  flex-wrap:wrap;justify-content:center;
  max-width:320px;
  padding:0 8px;
}
.btn{
  font-family:'Nunito',sans-serif;
  font-size:clamp(.8rem,.88rem,.92rem);font-weight:800;
  padding:11px 18px;
  border-radius:16px;border:none;cursor:pointer;
  transition:transform .12s,box-shadow .12s,filter .12s;
  letter-spacing:0.01em;
}
.btn:active{transform:scale(.93)!important;filter:brightness(.95);}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.10);}

.btn-freeze{
  background:linear-gradient(135deg,#a7f3d0,#34d399);
  color:#064e3b;
  box-shadow:0 4px 14px rgba(52,211,153,.35);
}
.btn-reset{
  background:linear-gradient(135deg,#d9f99d,#84cc16);
  color:#365314;
  box-shadow:0 4px 14px rgba(132,204,22,.30);
}
.btn-flavor{
  background:linear-gradient(135deg,#ccfbf1,#2dd4bf);
  color:#134e4a;
  box-shadow:0 4px 14px rgba(45,212,191,.30);
}
.btn-slang{
  background:linear-gradient(135deg,#e0f7ff,#7dd3fc);
  color:#0c4a6e;
  box-shadow:0 4px 14px rgba(125,211,252,.40);
  position:relative;overflow:hidden;
}
.btn-slang.active{
  background:linear-gradient(135deg,#ccf0ff,#38bdf8);
  color:#0c4a6e;
  box-shadow:0 4px 18px rgba(56,189,248,.50);
}
.btn-slang .new-badge{
  position:absolute;top:3px;right:5px;
  font-size:.46rem;font-weight:900;
  background:#7dd3fc;color:white;
  border-radius:4px;padding:1px 4px;
  letter-spacing:0.05em;
  transition:opacity .3s;
}
.btn-slang.used .new-badge{display:none;}
.btn-slang-color{
  background:linear-gradient(135deg,#d4f5c8,#a8e890);
  color:#2d6a1a;
  box-shadow:0 4px 14px rgba(120,210,80,.30);
  display:none;
  transition:background 0.35s ease, box-shadow 0.35s ease, color 0.2s ease;
}
.btn-slang-color.visible{display:inline-flex;align-items:center;gap:5px;}
/* 색깔별 테마 클래스 */
.btn-slang-color.theme-green { background:linear-gradient(135deg,#d4f5c8,#86efac); color:#14532d; box-shadow:0 4px 14px rgba(74,222,128,.35); }
.btn-slang-color.theme-sky   { background:linear-gradient(135deg,#e0f7ff,#7dd3fc); color:#0c4a6e; box-shadow:0 4px 14px rgba(125,211,252,.40); }
.btn-slang-color.theme-pink  { background:linear-gradient(135deg,#fce7f3,#f9a8d4); color:#831843; box-shadow:0 4px 14px rgba(249,168,212,.40); }
.btn-slang-color.theme-yellow{ background:linear-gradient(135deg,#fefce8,#fde68a); color:#713f12; box-shadow:0 4px 14px rgba(253,224,71,.40); }

/* ── FLASH ── */
#flash{position:fixed;inset:0;background:linear-gradient(135deg,#d1fae5,#ecfdf5);opacity:0;pointer-events:none;transition:opacity .06s;z-index:999;}
#pts{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.pt{position:absolute;pointer-events:none;}

/* ── ONBOARDING ── */
#onboarding{
  position:fixed;inset:0;
  background:rgba(2,44,34,0.55);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;gap:12px;
}
#onboarding.gone{display:none;}
.ob-card{
  background:linear-gradient(145deg,#ffffff,#f0fdf4);
  border-radius:28px;
  border:1.5px solid rgba(110,231,183,0.4);
  padding:32px 28px;max-width:300px;width:88%;
  display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;
  box-shadow:0 32px 80px rgba(6,78,59,0.2), 0 0 0 1px rgba(255,255,255,0.8);
}
.ob-step{display:none;flex-direction:column;align-items:center;gap:14px;}
.ob-step.active{display:flex;}
.ob-emoji{font-size:3rem;animation:obBounce 1.3s ease-in-out infinite;}
@keyframes obBounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(14px) scale(0.88);}}
.ob-title{font-family:'Fredoka',sans-serif;font-size:1.9rem;color:#064e3b;letter-spacing:0.5px;}
.ob-sub{font-size:.93rem;color:#059669;line-height:1.55;font-weight:600;}
.ob-btn{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
  padding:14px 36px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#34d399,#059669);
  color:white;cursor:pointer;
  box-shadow:0 6px 22px rgba(52,211,153,.45);
  margin-top:4px;transition:transform .12s;
}
.ob-btn:active{transform:scale(.95);}
.ob-dots{display:flex;gap:7px;margin-top:2px;}
.ob-dot{width:7px;height:7px;border-radius:50%;background:rgba(52,211,153,0.3);transition:background .2s;}
.ob-dot.on{background:#34d399;}

/* ── UNLOCK TOAST ── */
#unlockToast{
  position:fixed;top:72px;left:50%;
  transform:translateX(-50%) translateY(-16px);
  background:linear-gradient(135deg,#ecfdf5,#ffffff);
  border-radius:16px;padding:11px 18px;
  box-shadow:0 8px 28px rgba(52,211,153,0.22);
  display:flex;align-items:center;gap:10px;
  opacity:0;transition:opacity .28s,transform .28s;
  z-index:400;pointer-events:none;
  border:1.5px solid rgba(110,231,183,0.5);
}
#unlockToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ut-emoji{font-size:1.8rem;}
.ut-text{font-size:.88rem;font-weight:800;color:#064e3b;}

/* ── FLAVOR POPUP ── */
.popup{
  display:none;position:fixed;inset:0;
  background:rgba(2,44,34,0.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  align-items:center;justify-content:center;z-index:200;
}
.popup.open{display:flex;}
.popup-box{
  background:linear-gradient(145deg,#ffffff,#f0fdf4);
  border-radius:24px;padding:22px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:310px;width:92%;
  box-shadow:0 20px 60px rgba(6,78,59,0.18);
  border:1.5px solid rgba(110,231,183,0.35);
}
.popup-title{
  grid-column:1/-1;font-weight:900;font-size:1.05rem;
  font-family:'Fredoka',sans-serif;letter-spacing:0.5px;
  color:#064e3b;text-align:center;margin-bottom:2px;
}
.fi{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:11px 6px;border-radius:14px;cursor:pointer;
  border:2px solid transparent;transition:background .12s,transform .1s,border-color .12s;
  position:relative;
}
.fi:hover{background:#ecfdf5;transform:scale(1.05);}
.fi.sel{border-color:#34d399;background:#d1fae5;}
.fi.locked{opacity:0.4;cursor:default;}
.fi .em{font-size:1.8rem;}
.fi .nm{font-size:.72rem;color:#059669;font-weight:700;}
.fi .lock{position:absolute;top:4px;right:4px;font-size:.65rem;}
.fi .unlock-at{
  font-size:.6rem;color:#6ee7b7;font-weight:700;margin-top:-2px;
}
</style>
</head>
<body>

<div id="flash"></div>
<div id="pts"></div>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-card">
    <!-- Step 1 -->
    <div class="ob-step active" id="ob1">
      <div class="ob-emoji">🫧</div>
      <div class="ob-title">왁뿌볼</div>
      <div class="ob-sub">꾹 눌러서<br>왁스를 부숴봐요!</div>
      <button class="ob-btn" onclick="obNext()">다음 →</button>
    </div>
    <!-- Step 2 -->
    <div class="ob-step" id="ob2">
      <div class="ob-emoji">❄️</div>
      <div class="ob-title">냉동 & 향</div>
      <div class="ob-sub">냉동실에 얼리면 더 선명한 소리!<br>향 바꾸기로 색깔도 바꿔봐요 🎨</div>
      <button class="ob-btn" onclick="obNext()">다음 →</button>
    </div>
    <!-- Step 3 -->
    <div class="ob-step" id="ob3">
      <div class="ob-emoji">💚</div>
      <div class="ob-title">슬랑이</div>
      <div class="ob-sub">흰 부분 = 와사삭 ❄️<br>연두 부분 = 쫀득 💚<br>두 질감이 달라요!</div>
      <button class="ob-btn" onclick="dismissOnboarding()">시작!</button>
    </div>
    <!-- Dots -->
    <div class="ob-dots">
      <div class="ob-dot on" id="od1"></div>
      <div class="ob-dot" id="od2"></div>
      <div class="ob-dot" id="od3"></div>
    </div>
  </div>
</div>

<!-- UNLOCK TOAST -->
<div id="unlockToast">
  <div class="ut-emoji" id="utEmoji"></div>
  <div class="ut-text" id="utText"></div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="pill">
    <span class="pill-fire">🔥</span>
    연속&nbsp;<span class="pill-val" id="streakNum">0</span>
  </div>
  <div class="pill">
    오늘&nbsp;<span class="pill-val" id="cnt">0</span>
  </div>
</div>

<!-- MAIN -->
<div class="title-wrap">
  <h1>왁뿌볼 🫧</h1>
  <p class="sub">꾹 눌러서 우드득~</p>
</div>

<div class="scene" id="scene">
  <svg id="holdRing" viewBox="0 0 280 280" style="pointer-events:none;">
    <circle cx="140" cy="140" r="128" fill="none" stroke="rgba(167,243,208,0.6)" stroke-width="4"/>
    <circle id="holdRingPath" cx="140" cy="140" r="128"
      fill="none" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="804" stroke-dashoffset="804"
      stroke="#34d399"
      style="transform-origin:140px 140px;transform:rotate(-90deg);transition:stroke-dashoffset 0.05s linear,stroke 0.2s;"/>
  </svg>
  <canvas id="cv" width="260" height="260"></canvas>
  <div id="piecesDiv"></div>
</div>

<div class="status-wrap">
  <div class="status" id="status">꾹 눌러봐! 🤜</div>
</div>
<div class="hint" id="hint">❄️ 얼리면 더 선명해요</div>

<div class="controls">
  <button class="btn btn-freeze" id="freezeBtn" onclick="toggleFreeze()">❄️ 냉동실</button>
  <button class="btn btn-slang" id="slangBtn" onclick="toggleSlang()">🫧 슬랑이<span class="new-badge">NEW</span></button>
  <button class="btn btn-slang-color theme-green" id="slangColorBtn" onclick="cycleSlangColor()">🟢 연두</button>
  <button class="btn btn-flavor" onclick="openPop()">🎨 향 바꾸기</button>
  <button class="btn btn-reset" onclick="resetBall()">🔄 새 왁뿌볼</button>
</div>

<!-- FLAVOR POPUP -->
<div class="popup" id="popup" onclick="closePop(event)">
  <div class="popup-box">
    <div class="popup-title">향 선택 ✨</div>
    <div class="fi sel" id="fi0" onclick="tryFlavor(0)"><div class="em">🍏</div><div class="nm">청사과</div></div>
    <div class="fi" id="fi1" onclick="tryFlavor(1)"><div class="em">🍓</div><div class="nm">딸기</div></div>
    <div class="fi locked" id="fi2" onclick="tryFlavor(2)"><div class="em">🍇</div><div class="nm">포도</div><div class="lock">🔒</div><div class="unlock-at" id="ua2"></div></div>
    <div class="fi locked" id="fi3" onclick="tryFlavor(3)"><div class="em">🍑</div><div class="nm">복숭아</div><div class="lock">🔒</div><div class="unlock-at" id="ua3"></div></div>
    <div class="fi locked" id="fi4" onclick="tryFlavor(4)"><div class="em">🍋</div><div class="nm">레몬</div><div class="lock">🔒</div><div class="unlock-at" id="ua4"></div></div>
    <div class="fi locked" id="fi5" onclick="tryFlavor(5)"><div class="em">🫐</div><div class="nm">블루베리</div><div class="lock">🔒</div><div class="unlock-at" id="ua5"></div></div>
  </div>
</div>

<script>
// ── FLAVOR DATA ────────────────────────────────────────────────
const FLAVORS=[
  {name:'🍏 청사과',wax:['#b8f5c8','#4ec97a','#2a9050'],mal:['#ffe0a0','#ffbb30','#d08000'],unlock:0},
  {name:'🍓 딸기',  wax:['#ffc8d5','#e85d7a','#c0345a'],mal:['#fffaaa','#f5e040','#c8a000'],unlock:0},
  {name:'🍇 포도',  wax:['#e0c8f5','#9b59b6','#7d3c98'],mal:['#c8f5d0','#4ec97a','#2a9050'],unlock:5},
  {name:'🍑 복숭아',wax:['#ffd5b8','#ff9a6c','#e06030'],mal:['#d0f0ff','#60c0f0','#2080c0'],unlock:10},
  {name:'🍋 레몬',  wax:['#fffac0','#f0c800','#c9a000'],mal:['#ffc8e0','#f060a0','#c02070'],unlock:20},
  {name:'🫐 블루베리',wax:['#c0d4ff','#3c6fcd','#2450a0'],mal:['#ffd0b8','#ff8850','#d04818'],unlock:35},
];

// ── STREAK TIMEOUT (60초 안에 안 뿌시면 리셋) ──────────────────
const STREAK_TIMEOUT_MS = 60000;

// ── localStorage 저장/로드 ────────────────────────────────────
function saveState(){
  try{
    localStorage.setItem('waxpop_v1', JSON.stringify({
      crackCount,
      unlocked,
      currentFlavor,
      slangUsed,
      lastCrackTime: Date.now()
    }));
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem('waxpop_v1');
    if(!raw) return;
    const s=JSON.parse(raw);
    crackCount = s.crackCount || 0;
    // 오늘 날짜 체크 — 날짜 바뀌면 카운트 리셋
    const saved = new Date(s.lastCrackTime||0);
    const now   = new Date();
    if(saved.toDateString() !== now.toDateString()) crackCount = 0;
    if(Array.isArray(s.unlocked)) s.unlocked.forEach((v,i)=>{ unlocked[i]=v; });
    // 향 잠금 해제 재검증 (count 기반)
    FLAVORS.forEach((f,i)=>{ if(crackCount>=f.unlock) unlocked[i]=true; });
    currentFlavor = s.currentFlavor || 0;
    if(!unlocked[currentFlavor]) currentFlavor=0;
    WAX  = FLAVORS[currentFlavor].wax;
    MALANG = FLAVORS[currentFlavor].mal;
    if(s.slangUsed) slangUsed=true;
  }catch(e){}
}

// ── STATE ──────────────────────────────────────────────────────
let crackCount=0,isFrozen=false,crackLevel=0,isCracking=false;
let isSlang=false; // 슬랑이 모드
let slangUsed=false; // 슬랑이를 한 번이라도 써봤는지
let icebarCrackLevel=0; // 슬랑이 아이스바 전용 크랙
let icebarCrackPoly=null;
// ── 슬랑이 색깔 테마 ──────────────────────────────────────────
const SLANG_THEMES=[
  {
    id:'green', label:'🟢 연두',
    // 젤리 레이어 그라디언트 색상
    jelly:['rgba(220,252,175,','rgba(190,235,125,','rgba(158,215,95,','rgba(122,188,68,','rgba(88,158,42,'],
    // 젤리 엣지 오버레이
    edge:['rgba(175,232,115,0.0)','rgba(152,215,88,0.05)','rgba(125,195,65,0.18)','rgba(95,168,42,0.42)'],
    // 젤리 크랙 색상
    crackMain:'rgba(80,140,40,',crackHL:'rgba(195,245,140,',
    // 샤베트 글로우/내부 결
    shGrain:'rgba(200,235,195,1)',shGlow2:'rgba(232,255,210,',
    // 파티클 jelly 색상
    pJelly:['rgba(185,238,120,0.88)','rgba(165,220,95,0.84)','rgba(210,248,155,0.86)','rgba(140,205,80,0.82)'],
    pGlitter:['rgba(200,230,180,0.90)','rgba(220,245,200,0.88)','rgba(255,255,240,0.92)'],
    // 그림자
    shadow:'rgba(80,160,60,0.20)',
    // hold ring
    ring:'#34d399',
  },
  {
    id:'sky', label:'🔵 하늘',
    jelly:['rgba(186,230,255,','rgba(125,211,252,','rgba(56,189,248,','rgba(14,165,233,','rgba(2,132,199,'],
    edge:['rgba(147,210,255,0.0)','rgba(125,200,248,0.05)','rgba(90,175,230,0.18)','rgba(50,140,200,0.42)'],
    crackMain:'rgba(10,100,160,',crackHL:'rgba(186,238,255,',
    shGrain:'rgba(185,220,245,1)',shGlow2:'rgba(210,240,255,',
    pJelly:['rgba(125,211,252,0.88)','rgba(56,189,248,0.84)','rgba(186,230,255,0.86)','rgba(14,165,233,0.82)'],
    pGlitter:['rgba(180,220,255,0.90)','rgba(200,235,255,0.88)','rgba(240,250,255,0.92)'],
    shadow:'rgba(14,120,200,0.20)',
    ring:'#38bdf8',
  },
  {

function getBallPath(px,py,pf){
  const segs=128,pts=[];
  const pdx=px-CX,pdy=py-CY;
  const pdist=Math.sqrt(pdx*pdx+pdy*pdy)||0.001;
  const pux=pdx/pdist,puy=pdy/pdist;
  for(let i=0;i<=segs;i++){
    const angle=(i/segs)*Math.PI*2;
    const ux=Math.cos(angle),uy=Math.sin(angle);
    const dot=ux*pux+uy*puy;
    let r=R;
    if(pf>0){
      const dw=0.52;
      const gauss=Math.exp(-(1-dot)*(1-dot)/(2*dw*dw));
      const dimple=dot>0?gauss*30*pf:0;
      const bulge=Math.max(0,-dot)**2*pf*7;
      r=R-dimple+bulge;
    }
    pts.push([CX+ux*r,CY+uy*r]);
  }
  return pts;
}

// 얼린 상태 서리 결정 그리기
function drawFrost(alpha){
  if(alpha<=0) return;
  c.save();
  c.globalAlpha=alpha;
  // 방사형 서리 패턴
  const crystals=[
    {x:CX-38,y:CY-42,len:22,branches:5,angle:-0.7},
    {x:CX+42,y:CY-30,len:18,branches:4,angle:0.5},
    {x:CX-46,y:CY+36,len:20,branches:5,angle:2.1},
    {x:CX+36,y:CY+44,len:17,branches:4,angle:-2.4},
    {x:CX-10,y:CY-58,len:15,branches:4,angle:1.5},
    {x:CX+52,y:CY+8, len:14,branches:3,angle:-0.2},
    {x:CX-52,y:CY-10,len:14,branches:3,angle:3.0},
    {x:CX+10,y:CY+60,len:15,branches:4,angle:0.9},
  ];
  c.strokeStyle='rgba(220,245,255,0.9)';
  c.lineWidth=1.2;
  c.lineCap='round';
  crystals.forEach(({x,y,len,branches,angle})=>{
    // 클리핑 범위 체크
    const dx=x-CX,dy=y-CY;
    if(Math.sqrt(dx*dx+dy*dy)>R-4) return;
    for(let b=0;b<branches;b++){
      const a=angle+(b/branches)*Math.PI*2;
      c.beginPath();
      c.moveTo(x,y);
      const ex=x+Math.cos(a)*len,ey=y+Math.sin(a)*len;
      c.lineTo(ex,ey);
      // 가지
      const mid=0.5;
      const mx=x+Math.cos(a)*len*mid,my=y+Math.sin(a)*len*mid;
      c.moveTo(mx,my);
      c.lineTo(mx+Math.cos(a+Math.PI*0.5)*len*0.38,my+Math.sin(a+Math.PI*0.5)*len*0.38);
      c.moveTo(mx,my);
      c.lineTo(mx+Math.cos(a-Math.PI*0.5)*len*0.38,my+Math.sin(a-Math.PI*0.5)*len*0.38);
      c.stroke();
    }
    // 중심 점
    c.beginPath();
    c.arc(x,y,1.8,0,Math.PI*2);
    c.fillStyle='rgba(200,238,255,0.95)';
    c.fill();
  });
  c.restore();
}

function drawBall(crackLv,frozen,px,py,pf){
  py_last=py;
  c.clearRect(0,0,W,H);

  // shadow
  c.save();
  c.shadowColor='rgba(0,0,0,0.18)';c.shadowBlur=24;c.shadowOffsetY=10+pf*4;
  c.beginPath();c.arc(CX,CY+4,R-pf*8,0,Math.PI*2);
  c.fillStyle='rgba(0,0,0,0.01)';c.fill();
  c.restore();

  const pts=getBallPath(px,py,pf);
  c.save();
  c.beginPath();
  pts.forEach(([x,y],i)=>i===0?c.moveTo(x,y):c.lineTo(x,y));
  c.closePath();c.clip();

  // malang
  const mg=c.createRadialGradient(CX-18,CY-22,8,CX,CY,R);
  mg.addColorStop(0,MALANG[0]);mg.addColorStop(0.5,MALANG[1]);mg.addColorStop(1,MALANG[2]);
  c.fillStyle=mg;c.fillRect(0,0,W,H);

  // wax / frost
  if(!frozen){
    const wg=c.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
    wg.addColorStop(0,WAX[0]);wg.addColorStop(0.42,WAX[1]);wg.addColorStop(1,WAX[2]);
    c.fillStyle=wg;c.globalAlpha=Math.max(0.15,1-crackLv*0.09);c.fillRect(0,0,W,H);c.globalAlpha=1;
  } else {
    // 얼음 그라디언트
    const fg=c.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
    fg.addColorStop(0,'#dff2ff');fg.addColorStop(0.38,'#8dcce8');
    fg.addColorStop(0.75,'#48a0d4');fg.addColorStop(1,'#1a68a8');
    c.fillStyle=fg;c.globalAlpha=Math.max(0.15,1-crackLv*0.09);c.fillRect(0,0,W,H);c.globalAlpha=1;
    // 반투명 서리 오버레이
    c.fillStyle='rgba(210,238,255,0.18)';c.fillRect(0,0,W,H);
    // 서리 결정
    drawFrost(0.72);
  }

  // dimple shading
  if(pf>0.04){
    const pdx2=px-CX,pdy2=py-CY,pd=Math.sqrt(pdx2*pdx2+pdy2*pdy2)||1;
    const pu=[pdx2/pd,pdy2/pd];
    const dc=Math.min(pd,R*0.8);
    const dentX=CX+pu[0]*dc*0.7,dentY=CY+pu[1]*dc*0.7;
    const dentR=36*pf+8;
    const dg=c.createRadialGradient(dentX,dentY,0,dentX,dentY,dentR);
    dg.addColorStop(0,`rgba(0,0,0,${0.26*pf})`);
    dg.addColorStop(0.5,`rgba(0,0,0,${0.10*pf})`);
    dg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=dg;c.fillRect(0,0,W,H);
    const rg=c.createRadialGradient(dentX,dentY,dentR*0.5,dentX,dentY,dentR*1.15);
    rg.addColorStop(0,'rgba(255,255,255,0)');
    rg.addColorStop(0.65,`rgba(255,255,255,${0.16*pf})`);
    rg.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=rg;c.fillRect(0,0,W,H);
  }

  if(crackLv>0) drawCracks(crackLv,px,py);

  // shine
  const pdx3=px-CX,pdy3=py-CY,pd3=Math.sqrt(pdx3*pdx3+pdy3*pdy3)||1;
  const sOx=pf>0?(pdx3/pd3)*(-10*pf):0,sOy=pf>0?(pdy3/pd3)*(-10*pf):0;
  const sg=c.createRadialGradient(CX-34+sOx,CY-40+sOy,3,CX-8+sOx,CY-10+sOy,R*0.62);
  sg.addColorStop(0,'rgba(255,255,255,0.9)');sg.addColorStop(0.22,'rgba(255,255,255,0.25)');
  sg.addColorStop(0.5,'rgba(255,255,255,0.04)');sg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=sg;c.fillRect(0,0,W,H);
  c.restore();
}

// ── SLANG DRAW ─────────────────────────────────────────────────
// 슬랑이: 실물 사진 기반 — 연두/라임 반투명 젤리 + 크고 뭉실한 흰 샤베트 + 글리터
// 글리터 위치 캐시 (매 프레임 재생성 방지)
function genSlangGlitter(){
  const g=[];
  // 은별/스타 글리터
  for(let i=0;i<22;i++){
    const ang=Math.random()*Math.PI*2;
    const r=20+Math.random()*88;
    g.push({type:'star', x:CX+Math.cos(ang)*r, y:CY+Math.sin(ang)*r,
      size:1.4+Math.random()*3.2, alpha:0.35+Math.random()*0.5,
      rot:Math.random()*Math.PI});
  }
  // 홀로그램 육각/원형 조각
  for(let i=0;i<14;i++){
    const ang=Math.random()*Math.PI*2;
    const r=15+Math.random()*92;
    const T=SLANG_THEMES[slangColorIdx];
    const c1=T.pGlitter[0].replace(/,[\d.]+\)$/,',');
    const c2=T.pGlitter[1].replace(/,[\d.]+\)$/,',');
    g.push({type:'hex', x:CX+Math.cos(ang)*r, y:CY+Math.sin(ang)*r,
      size:2.2+Math.random()*4.5, alpha:0.28+Math.random()*0.42,
      hue:Math.random()<0.5?c1:c2});
  }
  // 작은 꽃 모양
  for(let i=0;i<8;i++){
    const ang=Math.random()*Math.PI*2;
    const r=30+Math.random()*78;
    g.push({type:'flower', x:CX+Math.cos(ang)*r, y:CY+Math.sin(ang)*r,
      size:2.5+Math.random()*2.8, alpha:0.4+Math.random()*0.35});
  }
  return g;
}

function drawGlitter(glitters){
  c.save();
  glitters.forEach(g=>{
    c.globalAlpha=g.alpha;
    if(g.type==='star'){
      // 4점 별
      c.save();c.translate(g.x,g.y);c.rotate(g.rot);
      c.strokeStyle='rgba(190,220,190,0.92)';c.lineWidth=0.85;
      const s=g.size;
      c.beginPath();c.moveTo(0,-s);c.lineTo(0,s);c.moveTo(-s,0);c.lineTo(s,0);
      c.moveTo(-s*0.55,-s*0.55);c.lineTo(s*0.55,s*0.55);
      c.moveTo(s*0.55,-s*0.55);c.lineTo(-s*0.55,s*0.55);
      c.stroke();
      c.restore();
    } else if(g.type==='hex'){
      // 원형/육각 홀로그램
      c.beginPath();c.arc(g.x,g.y,g.size,0,Math.PI*2);
      c.fillStyle=g.hue+'0.72)';c.fill();
    } else if(g.type==='flower'){
      // 작은 꽃
      c.save();c.translate(g.x,g.y);
      const s=g.size;
      for(let p=0;p<5;p++){
        const a=(p/5)*Math.PI*2;
        c.beginPath();c.arc(Math.cos(a)*s*0.7,Math.sin(a)*s*0.7,s*0.55,0,Math.PI*2);
        c.fillStyle='rgba(230,255,230,0.7)';c.fill();
      }
      c.beginPath();c.arc(0,0,s*0.4,0,Math.PI*2);
      c.fillStyle='rgba(255,255,255,0.9)';c.fill();
      c.restore();
    }
  });
  c.globalAlpha=1;
  c.restore();
}

function genSlangSherbetPos(){
  // 샤베트: 중앙보다 약간 위에, 매우 크게 (공의 55~65%)
  const angle=Math.random()*Math.PI*2;
  const dist=6+Math.random()*12;
  slangSherbetPos={
    x:CX+Math.cos(angle)*dist,
    y:CY-8+Math.sin(angle)*dist,  // 살짝 위로
    r:60+Math.random()*10          // 크게!
  };
  _slangGlitter=genSlangGlitter();
  currentCrackPoly=null;
}

function drawSlang(jellyCrackLv, sherbetCrackLv, px, py, pf){
  py_last=py;
  c.clearRect(0,0,W,H);
  if(!_slangGlitter) _slangGlitter=genSlangGlitter();
  const T=SLANG_THEMES[slangColorIdx]; // 현재 색깔 테마

  // shadow
  c.save();
  c.shadowColor=T.shadow;c.shadowBlur=30;c.shadowOffsetY=12+pf*4;
  c.beginPath();c.arc(CX,CY+4,R-pf*8,0,Math.PI*2);
  c.fillStyle='rgba(0,0,0,0.01)';c.fill();
  c.restore();

  const pts=getBallPath(px,py,pf);
  c.save();
  c.beginPath();
  pts.forEach(([x,y],i)=>i===0?c.moveTo(x,y):c.lineTo(x,y));
  c.closePath();c.clip();

  // ══ LAYER 1: 젤리 껍질 (테마 색상) ══
  const jellyAlpha = Math.max(0.18, 0.88 - jellyCrackLv * 0.08);
  const jg=c.createRadialGradient(CX-18,CY-22,8,CX,CY,R);
  jg.addColorStop(0,T.jelly[0]+jellyAlpha+')');
  jg.addColorStop(0.25,T.jelly[1]+jellyAlpha+')');
  jg.addColorStop(0.55,T.jelly[2]+(jellyAlpha*0.92)+')');
  jg.addColorStop(0.82,T.jelly[3]+(jellyAlpha*0.88)+')');
  jg.addColorStop(1,T.jelly[4]+(jellyAlpha*0.95)+')');
  c.fillStyle=jg;
  c.globalAlpha=1;
  c.fillRect(0,0,W,H);

  // 글리터: 젤리 안에 박힌 느낌 (젤리 크랙시 더 선명하게 보임)
  c.globalAlpha=0.55+jellyCrackLv*0.04;
  drawGlitter(_slangGlitter);
  c.globalAlpha=1;

  // ══ LAYER 2: 흰 샤베트 덩어리 (얼음 느낌, 크고 선명하게) ══
  const {x:sx,y:sy,r:sr}=slangSherbetPos;
  const shBreak = Math.min(1, sherbetCrackLv / 8);
  const shAlpha = Math.max(0.12, 0.96 - sherbetCrackLv * 0.06);

  // 샤베트 외곽 소프트 glow (얼음 빛 산란)
  const shGlow=c.createRadialGradient(sx-sr*0.08,sy-sr*0.12,sr*0.04,sx,sy,sr*1.5);
  shGlow.addColorStop(0,'rgba(255,255,255,0.65)');
  shGlow.addColorStop(0.38,'rgba(245,255,242,0.28)');
  shGlow.addColorStop(0.72,'rgba(230,248,225,0.10)');
  shGlow.addColorStop(1,'rgba(210,240,205,0)');
  c.fillStyle=shGlow;
  c.globalAlpha=shAlpha*0.80;
  c.fillRect(0,0,W,H);
  c.globalAlpha=1;

  // 샤베트 본체: 크랙 레벨에 따라 조각이 분리
  c.save();
  const numChunks = sherbetCrackLv<2?1:(sherbetCrackLv<4?2:sherbetCrackLv<6?3:5);
  const chunkOffsets=[
    [0,0],
    [sr*0.22*shBreak, -sr*0.14*shBreak],
    [-sr*0.24*shBreak,  sr*0.18*shBreak],
    [ sr*0.32*shBreak,  sr*0.26*shBreak],
    [-sr*0.18*shBreak, -sr*0.28*shBreak],
  ];
  const chunkScales=[1.0, 0.55, 0.50, 0.40, 0.36];

  for(let ci=0;ci<numChunks;ci++){
    const [ox,oy]=chunkOffsets[ci]||[0,0];
    const chunkR = sr * (chunkScales[ci]||0.35) * (1 - shBreak*0.16);
    const csx=sx+ox, csy=sy+oy;

    // 중심 순백 → 가장자리 반투명 (얼음 덩어리 느낌)
    const shg=c.createRadialGradient(
      csx-chunkR*0.20, csy-chunkR*0.26, chunkR*0.02,
      csx, csy, chunkR
    );
    shg.addColorStop(0, 'rgba(255,255,255,1.0)');
    shg.addColorStop(0.28,'rgba(252,255,250,0.98)');
    shg.addColorStop(0.58,'rgba(242,252,240,0.90)');
    shg.addColorStop(0.82,'rgba(225,245,220,0.60)');
    shg.addColorStop(1,  'rgba(205,238,200,0.06)');
    c.fillStyle=shg;
    c.globalAlpha=shAlpha*(ci===0?1.0:0.84);

    // 뭉게구름 윤곽
    c.beginPath();
    const blobs=ci===0?14:9;
    for(let i=0;i<=blobs;i++){
      const ang=(i/blobs)*Math.PI*2;
      const w1=1 + 0.20*Math.sin(ang*2.1+1.0+ci*0.8);
      const w2=   0.10*Math.cos(ang*3.8+0.6+ci*1.4);
      const w3=   0.06*Math.sin(ang*5.3+2.0+ci*1.0);
      const br=chunkR*(w1+w2+w3);
      i===0?c.moveTo(csx+Math.cos(ang)*br,csy+Math.sin(ang)*br)
           :c.lineTo(csx+Math.cos(ang)*br,csy+Math.sin(ang)*br);
    }
    c.closePath();c.fill();
    c.globalAlpha=1;

    // 샤베트 내부 미세 결 (얼음 질감 — 크랙 없을때만)
    if(ci===0 && sherbetCrackLv<3){
      const T=SLANG_THEMES[slangColorIdx];
      c.globalAlpha=0.22;
      c.strokeStyle=T.shGrain;
      c.lineWidth=0.7;
      for(let k=0;k<8;k++){
        const ka=(k/8)*Math.PI*2+0.4;
        const klen=chunkR*(0.32+k*0.045);
        c.beginPath();
        c.moveTo(csx+Math.cos(ka)*chunkR*0.08, csy+Math.sin(ka)*chunkR*0.08);
        c.lineTo(csx+Math.cos(ka)*klen, csy+Math.sin(ka)*klen);
        c.stroke();
      }
      c.globalAlpha=1;
    }
  }
  c.restore();

  // ══ 젤리 가장자리 두께감 오버레이 ══
  const jellyEdge=c.createRadialGradient(CX,CY,R*0.32,CX,CY,R);
  jellyEdge.addColorStop(0,T.edge[0]);
  jellyEdge.addColorStop(0.58,T.edge[1]);
  jellyEdge.addColorStop(0.80,T.edge[2]);
  jellyEdge.addColorStop(1,T.edge[3]);
  c.fillStyle=jellyEdge;
  c.globalAlpha=0.88;
  c.fillRect(0,0,W,H);
  c.globalAlpha=1;

  // dimple shading
  if(pf>0.04){
    const pdx2=px-CX,pdy2=py-CY,pd=Math.sqrt(pdx2*pdx2+pdy2*pdy2)||1;
    const pu=[pdx2/pd,pdy2/pd];
    const dc=Math.min(pd,R*0.8);
    const dentX=CX+pu[0]*dc*0.7,dentY=CY+pu[1]*dc*0.7;
    const dentR=36*pf+8;
    const dg=c.createRadialGradient(dentX,dentY,0,dentX,dentY,dentR);
    dg.addColorStop(0,`rgba(0,0,0,${0.18*pf})`);
    dg.addColorStop(0.5,`rgba(0,0,0,${0.07*pf})`);
    dg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=dg;c.fillRect(0,0,W,H);
  }

  // ══ 크랙 레이어별 렌더링 ══
  // 젤리 크랙: 연두색 표면에 늘어나는 실금 (쫀득 느낌)
  if(jellyCrackLv>0) drawJellyCracks(jellyCrackLv);
  // 샤베트 크랙: 흰 덩어리 위에 날카로운 얼음 균열
  if(sherbetCrackLv>0) drawSherbetCracks(sherbetCrackLv);

  // shine
  const pdx3=px-CX,pdy3=py-CY,pd3=Math.sqrt(pdx3*pdx3+pdy3*pdy3)||1;
  const sOx=pf>0?(pdx3/pd3)*(-10*pf):0,sOy=pf>0?(pdy3/pd3)*(-10*pf):0;
  const sg=c.createRadialGradient(CX-38+sOx,CY-44+sOy,2,CX-7+sOx,CY-9+sOy,R*0.50);
  sg.addColorStop(0,'rgba(255,255,255,0.90)');
  sg.addColorStop(0.16,'rgba(255,255,255,0.30)');
  sg.addColorStop(0.42,'rgba(255,255,255,0.05)');
  sg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=sg;c.fillRect(0,0,W,H);

  const sg2=c.createRadialGradient(CX+32,CY+38,0,CX+24,CY+30,R*0.34);
  sg2.addColorStop(0,T.shGlow2+'0.18)');
  sg2.addColorStop(1,T.shGlow2+'0)');
  c.fillStyle=sg2;c.fillRect(0,0,W,H);

  c.restore();
}

// ══ 슬랑이 아이스바 드로우 ══════════════════════════════════════
// isSlang && isFrozen 일 때: 전체가 꽁꽁 얼어붙은 샤베트 덩어리
function drawSlangIcebar(crackLv, px, py, pf){
  py_last=py;
  c.clearRect(0,0,W,H);
  const T=SLANG_THEMES[slangColorIdx];

  // shadow — 얼음 그림자, 파란 기운
  c.save();
  c.shadowColor='rgba(14,120,200,0.22)';c.shadowBlur=32;c.shadowOffsetY=14+pf*4;
  c.beginPath();c.arc(CX,CY+4,R-pf*8,0,Math.PI*2);
  c.fillStyle='rgba(0,0,0,0.01)';c.fill();
  c.restore();

  const pts=getBallPath(px,py,pf);
  c.save();
  c.beginPath();
  pts.forEach(([x,y],i)=>i===0?c.moveTo(x,y):c.lineTo(x,y));
  c.closePath();c.clip();

  // ── BASE: 테마 색상 + 얼음 파란 오버레이 ──
  // 젤리 색상이 얼음에 갇혀 더 진하고 불투명하게
  const bg=c.createRadialGradient(CX-20,CY-24,6,CX,CY,R);
  bg.addColorStop(0,  T.jelly[0]+'1.0)');
  bg.addColorStop(0.30,T.jelly[1]+'0.96)');
  bg.addColorStop(0.62,T.jelly[2]+'0.92)');
  bg.addColorStop(0.88,T.jelly[3]+'0.98)');
  bg.addColorStop(1,  T.jelly[4]+'1.0)');
  c.fillStyle=bg;c.fillRect(0,0,W,H);

  // 얼음 파란 오버레이 (냉기 느낌)
  const iceOv=c.createRadialGradient(CX+18,CY-20,8,CX,CY,R);
  iceOv.addColorStop(0,'rgba(210,240,255,0.22)');
  iceOv.addColorStop(0.45,'rgba(180,220,255,0.30)');
  iceOv.addColorStop(0.80,'rgba(140,195,240,0.38)');
  iceOv.addColorStop(1,'rgba(80,150,220,0.52)');
  c.fillStyle=iceOv;c.fillRect(0,0,W,H);

  // ── 전체 샤베트 텍스처: 크고 뭉실한 흰 덩어리 여러 개 ──
  // 아이스바는 전체가 샤베트 — 구체적으로 7~9개 조각이 공 전체를 덮음
  const chunks=[
    {x:CX,    y:CY-10, r:68},
    {x:CX-38, y:CY+20, r:48},
    {x:CX+40, y:CY+18, r:44},
    {x:CX+10, y:CY+52, r:38},
    {x:CX-42, y:CY-30, r:36},
    {x:CX+44, y:CY-28, r:32},
    {x:CX-8,  y:CY-58, r:28},
  ];
  const breakAmt=Math.min(1, crackLv/9);
  const breakDirs=[[0,0],[-.18,.14],[.20,-.12],[.08,.22],[-.22,-.18],[.24,.10],[-.10,-.24]];

  chunks.forEach((ch,ci)=>{
    const [bdx,bdy]=breakDirs[ci]||[0,0];
    const ox=bdx*R*breakAmt, oy=bdy*R*breakAmt;
    const csx=ch.x+ox, csy=ch.y+oy;
    const chR=ch.r*(1-breakAmt*0.12);

    const shg=c.createRadialGradient(
      csx-chR*0.22, csy-chR*0.28, chR*0.02,
      csx, csy, chR
    );
    shg.addColorStop(0,'rgba(255,255,255,1.0)');
    shg.addColorStop(0.22,'rgba(250,253,255,0.98)');
    shg.addColorStop(0.52,'rgba(232,246,255,0.88)');
    shg.addColorStop(0.80,'rgba(210,235,255,0.55)');
    shg.addColorStop(1,'rgba(180,215,250,0.04)');
    c.fillStyle=shg;
    c.globalAlpha=Math.max(0.15, 0.94-crackLv*0.05)*(ci===0?1.0:0.82);

    // 뭉글뭉글 윤곽
    c.beginPath();
    const blobs=ci===0?14:9;
    for(let i=0;i<=blobs;i++){
      const ang=(i/blobs)*Math.PI*2;
      const w1=1+0.22*Math.sin(ang*2.3+ci*0.9+1.1);
      const w2=  0.11*Math.cos(ang*3.6+ci*1.5+0.5);
      const w3=  0.06*Math.sin(ang*5.1+ci*0.7+2.2);
      const br=chR*(w1+w2+w3);
      i===0?c.moveTo(csx+Math.cos(ang)*br, csy+Math.sin(ang)*br)
           :c.lineTo(csx+Math.cos(ang)*br, csy+Math.sin(ang)*br);
    }
    c.closePath();c.fill();
    c.globalAlpha=1;

    // 얼음 내부 결정 결 (작은 방사형 선)
    if(crackLv<4){
      c.save();
      c.globalAlpha=0.18-crackLv*0.02;
      c.strokeStyle='rgba(200,230,255,1)';
      c.lineWidth=0.65;
      for(let k=0;k<6;k++){
        const ka=(k/6)*Math.PI*2+ci*0.5;
        const klen=chR*(0.28+k*0.055);
        c.beginPath();
        c.moveTo(csx+Math.cos(ka)*chR*0.06, csy+Math.sin(ka)*chR*0.06);
        c.lineTo(csx+Math.cos(ka)*klen, csy+Math.sin(ka)*klen);
        c.stroke();
      }
      c.restore();
    }
  });

  // ── 서리 결정 (전체 표면) ──
  drawFrost(0.55 + crackLv*0.04);

  // ── 얼음 표면 광택 오버레이 ──
  const surfGlow=c.createRadialGradient(CX-8,CY-12,R*0.1,CX,CY,R*0.88);
  surfGlow.addColorStop(0,'rgba(200,235,255,0.20)');
  surfGlow.addColorStop(0.5,'rgba(160,210,250,0.08)');
  surfGlow.addColorStop(1,'rgba(120,180,240,0.22)');
  c.fillStyle=surfGlow;c.fillRect(0,0,W,H);

  // ── 크랙 ──
  if(crackLv>0) drawIcebarCracks(crackLv,px,py);

  // dimple shading
  if(pf>0.04){
    const pdx2=px-CX,pdy2=py-CY,pd=Math.sqrt(pdx2*pdx2+pdy2*pdy2)||1;
    const pu=[pdx2/pd,pdy2/pd];
    const dc=Math.min(pd,R*0.8);
    const dentX=CX+pu[0]*dc*0.7,dentY=CY+pu[1]*dc*0.7;
    const dentR=36*pf+8;
    const dg=c.createRadialGradient(dentX,dentY,0,dentX,dentY,dentR);
    dg.addColorStop(0,`rgba(0,0,0,${0.14*pf})`);
    dg.addColorStop(0.5,`rgba(0,0,0,${0.05*pf})`);
    dg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=dg;c.fillRect(0,0,W,H);
  }

  // shine — 얼음 반사광 (더 날카롭게)
  const pdx3=px-CX,pdy3=py-CY,pd3=Math.sqrt(pdx3*pdx3+pdy3*pdy3)||1;
  const sOx=pf>0?(pdx3/pd3)*(-8*pf):0,sOy=pf>0?(pdy3/pd3)*(-8*pf):0;
  const sg=c.createRadialGradient(CX-38+sOx,CY-44+sOy,1,CX-6+sOx,CY-8+sOy,R*0.44);
  sg.addColorStop(0,'rgba(255,255,255,0.96)');
  sg.addColorStop(0.14,'rgba(220,240,255,0.38)');
  sg.addColorStop(0.38,'rgba(200,230,255,0.06)');
  sg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=sg;c.fillRect(0,0,W,H);

  // 보조 하이라이트 (얼음 모서리 반사)
  const sg2=c.createRadialGradient(CX+48,CY+42,0,CX+36,CY+32,R*0.30);
  sg2.addColorStop(0,'rgba(180,220,255,0.22)');
  sg2.addColorStop(1,'rgba(180,220,255,0)');
  c.fillStyle=sg2;c.fillRect(0,0,W,H);

  c.restore();
}

// ── 아이스바 크랙: 유리처럼 날카롭고 직선적인 균열 ─────────────
function genIcebarCrackPoly(){
  const lines=[];
  const n=8+Math.floor(Math.random()*4);
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const startR=R*(0.02+Math.random()*0.10);
    const endR=R*(0.72+Math.random()*0.30);
    const w=(Math.random()-0.5)*0.18; // 거의 직선 (얼음 특성)
    lines.push({pts:[
      [CX+Math.cos(ang)*startR, CY+Math.sin(ang)*startR],
      [CX+Math.cos(ang+w)*endR*0.5, CY+Math.sin(ang+w)*endR*0.5],
      [CX+Math.cos(ang+w*1.5)*endR, CY+Math.sin(ang+w*1.5)*endR]
    ]});
    // 교차 균열 — 아이스바는 격자 패턴처럼 깨짐
    if(Math.random()>0.35){
      const brAng=ang+Math.PI/2+(Math.random()-0.5)*0.4;
      const midR=R*(0.25+Math.random()*0.30);
      const brEnd=R*(0.30+Math.random()*0.45);
      const startMid=[CX+Math.cos(ang)*midR, CY+Math.sin(ang)*midR];
      lines.push({pts:[
        startMid,
        [CX+Math.cos(brAng)*brEnd*0.5, CY+Math.sin(brAng)*brEnd*0.5],
        [CX+Math.cos(brAng)*brEnd, CY+Math.sin(brAng)*brEnd]
      ]});
    }
  }
  return lines;
}

function drawIcebarCracks(lv, px, py){
  if(!icebarCrackPoly) icebarCrackPoly=genIcebarCrackPoly();
  const n=Math.min(lv*2, icebarCrackPoly.length);
  const T=SLANG_THEMES[slangColorIdx];
  c.save();c.lineCap='round';c.lineJoin='round';
  for(let i=0;i<n;i++){
    const cr=icebarCrackPoly[i];
    // 얼음 크랙: 어두운 파란 선 + 흰 하이라이트
    c.beginPath();
    c.moveTo(cr.pts[0][0],cr.pts[0][1]);
    for(let j=1;j<cr.pts.length;j++) c.lineTo(cr.pts[j][0],cr.pts[j][1]);
    c.strokeStyle=`rgba(60,120,200,${0.52+i*0.025})`;
    c.lineWidth=i<4?2.0:1.2;
    c.shadowColor='rgba(30,80,180,0.4)';c.shadowBlur=3;
    c.stroke();
    // 하이라이트 (얼음 균열 빛 반사)
    c.strokeStyle=`rgba(220,240,255,${0.70+i*0.02})`;
    c.lineWidth=i<4?0.8:0.4;
    c.shadowBlur=0;
    c.stroke();
  }
  c.restore();
}

// ── 아이스바 전용 사운드: 아삭아삭 얼음 결정 연속 파쇄 ──────────
// 샤베트Crunch보다 훨씬 바삭하고 건조, 더 고음, 더 많은 클릭 연타
function playIcebarCrunch(intensity){
  const ac=getAC(), now=ac.currentTime;
  const master=ac.createDynamicsCompressor();
  master.threshold.value=-3; master.knee.value=1.5;
  master.ratio.value=7;     master.attack.value=0.0003;
  master.release.value=0.03;master.connect(ac.destination);

  // A. 아삭 핵심: 초고음 얼음 결정 연타 (8~12개, 간격 불규칙)
  const numClicks=8+Math.floor(intensity*5);
  for(let k=0;k<numClicks;k++){
    const clickLen=Math.floor(ac.sampleRate*0.012); // 12ms 극단 짧음
    const cBuf=ac.createBuffer(2,clickLen,ac.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=cBuf.getChannelData(ch);
      for(let i=0;i<clickLen;i++){
        const tt=i/ac.sampleRate;
        const env=tt<0.0006?tt/0.0006:Math.exp(-(tt-0.0006)*280);
        d[i]=(Math.random()*2-1)*env*(ch===0?1:0.86+Math.random()*0.12);
      }
    }
    const cSrc=ac.createBufferSource();cSrc.buffer=cBuf;
    const cHP=ac.createBiquadFilter();cHP.type='highpass';cHP.frequency.value=5500+k*300;
    const cPK=ac.createBiquadFilter();cPK.type='peaking'; cPK.frequency.value=7000+k*500;cPK.Q.value=1.4;cPK.gain.value=14;
    const cG=ac.createGain();cG.gain.value=(1.0-k*0.06)*intensity;
    cSrc.connect(cHP);cHP.connect(cPK);cPK.connect(cG);cG.connect(master);
    cSrc.start(now+k*0.010+Math.random()*0.005);
  }

  // B. 아삭 표면 마찰: 매우 건조하고 고음 (서걱 아닌 아삭)
  const scrLen=Math.floor(ac.sampleRate*0.04);
  const scrBuf=ac.createBuffer(2,scrLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=scrBuf.getChannelData(ch);
    for(let i=0;i<scrLen;i++){
      const tt=i/ac.sampleRate;
      const env=tt<0.002?tt/0.002:Math.exp(-(tt-0.002)*55);
      const mod=0.5+0.5*Math.sin(tt*2800); // 더 빠른 변조 = 더 아삭
      d[i]=(Math.random()*2-1)*env*mod*(ch===0?1:0.92);
    }
  }
  const scrSrc=ac.createBufferSource();scrSrc.buffer=scrBuf;
  const scrHP=ac.createBiquadFilter();scrHP.type='highpass';scrHP.frequency.value=7000;
  const scrLP=ac.createBiquadFilter();scrLP.type='lowpass'; scrLP.frequency.value=16000;
  const scrG=ac.createGain();scrG.gain.value=0.6*intensity;
  scrSrc.connect(scrHP);scrHP.connect(scrLP);scrLP.connect(scrG);scrG.connect(master);
  scrSrc.start(now+0.005);

  // C. 얼음 충격 임팩트 (매우 짧고 날카롭게 — 아이스바 특유의 딱!)
  const impOsc=ac.createOscillator();impOsc.type='sine';
  impOsc.frequency.setValueAtTime(180,now);
  impOsc.frequency.exponentialRampToValueAtTime(75,now+0.025);
  const impG=ac.createGain();
  impG.gain.setValueAtTime(0,now);
  impG.gain.linearRampToValueAtTime(0.45*intensity,now+0.001);
  impG.gain.exponentialRampToValueAtTime(0.001,now+0.03);
  impOsc.connect(impG);impG.connect(master);
  impOsc.start(now);impOsc.stop(now+0.035);
}

// 아이스바 최종 폭발: 와장창! 얼음 전체 박살
function playIcebarBurst(intensity){
  const ac=getAC(), now=ac.currentTime;
  const master=ac.createDynamicsCompressor();
  master.threshold.value=-2; master.knee.value=1;
  master.ratio.value=8;     master.attack.value=0.0003;
  master.release.value=0.04;master.connect(ac.destination);

  // 아삭 클릭 대량 (15~18개)
  const numClicks=15+Math.floor(intensity*5);
  for(let k=0;k<numClicks;k++){
    const cLen=Math.floor(ac.sampleRate*0.013);
    const cBuf=ac.createBuffer(2,cLen,ac.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=cBuf.getChannelData(ch);
      for(let i=0;i<cLen;i++){
        const tt=i/ac.sampleRate;
        const env=tt<0.0005?tt/0.0005:Math.exp(-(tt-0.0005)*260);
        d[i]=(Math.random()*2-1)*env*(ch===0?1:0.84+Math.random()*0.14);
      }
    }
    const cSrc=ac.createBufferSource();cSrc.buffer=cBuf;
    const cHP=ac.createBiquadFilter();cHP.type='highpass';cHP.frequency.value=4800+k*250;
    const cPK=ac.createBiquadFilter();cPK.type='peaking'; cPK.frequency.value=6800+k*400;cPK.Q.value=1.2;cPK.gain.value=12;
    const cG=ac.createGain();cG.gain.value=(1.15-k*0.05)*intensity;
    cSrc.connect(cHP);cHP.connect(cPK);cPK.connect(cG);cG.connect(master);
    cSrc.start(now+k*0.009+Math.random()*0.005);
  }

  // 와장창 저역 임팩트
  const kickOsc=ac.createOscillator();kickOsc.type='sine';
  kickOsc.frequency.setValueAtTime(200,now);
  kickOsc.frequency.exponentialRampToValueAtTime(50,now+0.12);
  const kickG=ac.createGain();
  kickG.gain.setValueAtTime(0,now);
  kickG.gain.linearRampToValueAtTime(1.4*intensity,now+0.002);
  kickG.gain.exponentialRampToValueAtTime(0.001,now+0.18);
  kickOsc.connect(kickG);kickG.connect(master);
  kickOsc.start(now);kickOsc.stop(now+0.20);

  // 고음 노이즈 버스트 (얼음 파편 흩어짐)
  const bLen=Math.floor(ac.sampleRate*0.14);
  const bBuf=ac.createBuffer(2,bLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=bBuf.getChannelData(ch);
    for(let i=0;i<bLen;i++){
      const tt=i/ac.sampleRate;
      const env=tt<0.003?tt/0.003:Math.exp(-(tt-0.003)*20);
      d[i]=(Math.random()*2-1)*env*(ch===0?1:0.88);
    }
  }
  const bSrc=ac.createBufferSource();bSrc.buffer=bBuf;
  const bHP=ac.createBiquadFilter();bHP.type='highpass';bHP.frequency.value=4000;
  const bLP=ac.createBiquadFilter();bLP.type='lowpass'; bLP.frequency.value=18000;
  const bG=ac.createGain();bG.gain.value=1.0*intensity;
  bSrc.connect(bHP);bHP.connect(bLP);bLP.connect(bG);bG.connect(master);
  bSrc.start(now+0.005);

  // 유리 링잉 (얼음 파열 후 여운)
  const ring=ac.createOscillator();ring.type='triangle';
  ring.frequency.setValueAtTime(7800,now);
  ring.frequency.exponentialRampToValueAtTime(3200,now+0.22);
  const ringG=ac.createGain();
  ringG.gain.setValueAtTime(0.22*intensity,now);
  ringG.gain.exponentialRampToValueAtTime(0.001,now+0.26);
  ring.connect(ringG);ringG.connect(master);
  ring.start(now);ring.stop(now+0.28);
}

// 아이스바 파티클: 온통 흰 얼음 파편 + 반짝이 + 테마 색 조각
function spawnIcebarParticles(){
  const host=document.getElementById('pts');
  const rect=scene.getBoundingClientRect();
  const cx=rect.left+rect.width/2, cy=rect.top+rect.height/2;
  const T=SLANG_THEMES[slangColorIdx];
  const n=52;
  for(let i=0;i<n;i++){

function genSherbetCrackPoly(){
  // 샤베트 크랙: 샤베트 중심에서 바깥으로 (얼음 깨지듯)
  const {x:sx,y:sy,r:sr}=slangSherbetPos;
  const n=8+Math.floor(Math.random()*4);
  const lines=[];
  for(let i=0;i<n;i++){
    const ang=Math.random()*Math.PI*2;
    const startR=sr*(0.04+Math.random()*0.14);
    const endR=sr*(0.60+Math.random()*0.65);
    const w1=(Math.random()-0.5)*0.55;
    const w2=(Math.random()-0.5)*0.32;
    lines.push({pts:[
      [sx+Math.cos(ang)*startR, sy+Math.sin(ang)*startR],
      [sx+Math.cos(ang+w1)*endR*0.48, sy+Math.sin(ang+w1)*endR*0.48],
      [sx+Math.cos(ang+w2)*endR, sy+Math.sin(ang+w2)*endR]
    ]});
    if(Math.random()>0.28){
      const midR=sr*(0.30+Math.random()*0.28);
      const brAng=ang+(Math.random()-0.5)*1.1;
      const brEnd=sr*(0.22+Math.random()*0.58);
      lines.push({pts:[
        [sx+Math.cos(ang)*midR, sy+Math.sin(ang)*midR],
        [sx+Math.cos(brAng)*brEnd*0.55, sy+Math.sin(brAng)*brEnd*0.55],
        [sx+Math.cos(brAng)*brEnd, sy+Math.sin(brAng)*brEnd]
      ]});
    }
  }
  return lines;
}

let currentCrackPoly=null;
function genCrackPoly(){
  const n=5+Math.floor(Math.random()*3);
  const angles=[];
  for(let i=0;i<n;i++) angles.push(Math.random()*Math.PI*2);
  angles.sort((a,b)=>a-b);
  const lines=angles.map(a=>{
    const len=R*(0.7+Math.random()*0.35);
    const wobble=(Math.random()-0.5)*0.3;
    return {
      pts:[
        [CX,CY],
        [CX+Math.cos(a+wobble)*len*0.5, CY+Math.sin(a+wobble)*len*0.5],
        [CX+Math.cos(a)*len, CY+Math.sin(a)*len]
      ]
    };
  });
  const branches=angles.slice(0,3).map(a=>{
    const blen=R*(0.3+Math.random()*0.3);
    const ba=a+(Math.random()-0.5)*0.8;
    const startDist=R*(0.3+Math.random()*0.3);
    return {

        [CX+Math.cos(ba)*blen, CY+Math.sin(ba)*blen]

    };
  });
  return [...lines,...branches];
}

function genPiecePolys(){
  const n=6+Math.floor(Math.random()*3);
  const angles=[];
  for(let i=0;i<n;i++) angles.push((i/n)*Math.PI*2+(Math.random()-0.5)*0.4);
  angles.sort((a,b)=>a-b);
  return angles.map((a,i)=>{
    const a2=angles[(i+1)%n];
    const r1=R*(0.55+Math.random()*0.35);
    const r2=R*(0.55+Math.random()*0.35);
    return [
      [0,0],
      [Math.cos(a)*r1, Math.sin(a)*r1],
      [Math.cos((a+a2)/2)*(R*0.9), Math.sin((a+a2)/2)*(R*0.9)],
      [Math.cos(a2)*r2, Math.sin(a2)*r2],
    ];
  });
}

// ── AUDIO: 달걀 껍질 파열음 ────────────────────────────────────
// 실제 왁스볼 녹음 분석 기반:
//   - 지배 주파수: 3~6kHz (45~62%)
//   - 어택: 5~20ms (초고속, 즉각적)
//   - 엔벨로프: 불규칙 다중 파열 (단조롭지 않게)
//   - 저역 에너지 매우 낮음 (~4%)
function getAC(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// 달걀 껍질 단일 크랙 펄스
// freq: 중심 주파수, decay: 감쇠 속도, amp: 진폭, t: 시작 시간
function shellCrack(ac, dest, freq, decay, amp, t){
  const dur = 0.12;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for(let ch=0; ch<2; ch++){
    const d = buf.getChannelData(ch);
    const pan = ch===0 ? 1.0 : (0.86 + Math.random()*0.08); // 미세 스테레오
    for(let i=0; i<len; i++){
      const tt = i/ac.sampleRate;
      // 달걀 껍질: 두 레이어
      // L1 — 얇은 껍질 충격: 매우 빠른 어택 (~5ms), 고음 위주
      const n1 = (Math.random()*2-1) * Math.exp(-tt * decay);
      // L2 — 파편 굴러가는 소리: 약간 길게 잔향
      const n2 = (Math.random()*2-1) * Math.exp(-tt * decay * 0.28);
      // 소프트 클리핑: 날카로운 포화감 (껍질의 딱딱함)
      d[i] = Math.tanh((n1*0.68 + n2*0.32) * 4.2) * pan;
    }
  }
  const src = ac.createBufferSource();
  src.buffer = buf;

  // 달걀 껍질 EQ: 3~6kHz 지배, 저역 컷
  const hp  = ac.createBiquadFilter(); hp.type='highpass';  hp.frequency.value=600;  hp.Q.value=0.8;
  const bp1 = ac.createBiquadFilter(); bp1.type='peaking';  bp1.frequency.value=freq; bp1.Q.value=0.7; bp1.gain.value=10;
  const bp2 = ac.createBiquadFilter(); bp2.type='peaking';  bp2.frequency.value=freq*1.25; bp2.Q.value=0.9; bp2.gain.value=6;
  const lp  = ac.createBiquadFilter(); lp.type='lowpass';   lp.frequency.value=9500; lp.Q.value=0.6;

  const g = ac.createGain();
  g.gain.setValueAtTime(amp, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);

  src.connect(hp); hp.connect(bp1); bp1.connect(bp2); bp2.connect(lp); lp.connect(g); g.connect(dest);
  src.start(t);
}

// playWageujeok = 최종 터짐 전용. 팡! 쾌감 극대화.
function playWageujeok(intensity, frozen){
  const ac = getAC(), now = ac.currentTime;

  // ── MASTER COMPRESSOR: 전체 사운드를 빵빵하게 ─────────────────
  const master = ac.createDynamicsCompressor();
  master.threshold.value = -6;
  master.knee.value = 2;
  master.ratio.value = 4;
  master.attack.value = 0.001;
  master.release.value = 0.08;
  master.connect(ac.destination);

  // ── A. 슈퍼 임팩트 베이스: 두꺼운 "팡!" 몸통 ─────────────────
  // 킥드럼식 스윕: 80Hz → 28Hz 피치 드롭
  const kickOsc = ac.createOscillator();
  kickOsc.type = 'sine';
  kickOsc.frequency.setValueAtTime(frozen ? 100 : 80, now);
  kickOsc.frequency.exponentialRampToValueAtTime(frozen ? 30 : 22, now + 0.25);
  const kickDistWave = new Float32Array(256);
  for(let i=0;i<256;i++) kickDistWave[i] = Math.tanh((i/128-1)*4.5);
  const kickCurve = ac.createWaveShaper();
  kickCurve.curve = kickDistWave;
  kickCurve.oversample = '4x';
  const kickG = ac.createGain();
  kickG.gain.setValueAtTime(0, now);
  kickG.gain.linearRampToValueAtTime(1.8 * intensity, now + 0.003);
  kickG.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  kickOsc.connect(kickCurve); kickCurve.connect(kickG); kickG.connect(master);
  kickOsc.start(now); kickOsc.stop(now + 0.38);

  // ── B. 공기 폭발 "팡!": 와이드밴드 노이즈 버스트 ──────────────
  const burstLen = Math.floor(ac.sampleRate * 0.04);
  const burstBuf = ac.createBuffer(2, burstLen, ac.sampleRate);
  for(let ch=0; ch<2; ch++){
    const d = burstBuf.getChannelData(ch);
    for(let i=0; i<burstLen; i++){
      const tt = i/ac.sampleRate;
      const env = tt < 0.002 ? tt/0.002 : Math.exp(-(tt-0.002)*55);
      d[i] = (Math.random()*2-1) * env * (ch===0?1:0.95+Math.random()*0.05);
    }
  }
  const burstSrc = ac.createBufferSource(); burstSrc.buffer = burstBuf;
  // 넓은 밴드 — 200Hz~8kHz
  const burstHP = ac.createBiquadFilter(); burstHP.type='highpass'; burstHP.frequency.value=200;
  const burstLP = ac.createBiquadFilter(); burstLP.type='lowpass';  burstLP.frequency.value=8000;
  const burstG  = ac.createGain(); burstG.gain.value = 2.2 * intensity;
  burstSrc.connect(burstHP); burstHP.connect(burstLP); burstLP.connect(burstG); burstG.connect(master);
  burstSrc.start(now);

  // ── C. 예리한 파열 에지: 껍질 쩍! ──────────────────────────────
  shellCrack(ac, master, frozen?5800:4200, frozen?72:55, 1.4*intensity, now);
  shellCrack(ac, master, frozen?4400:3200, frozen?65:48, 0.9*intensity, now+0.004);
  shellCrack(ac, master, frozen?3600:2600, frozen?58:42, 0.6*intensity, now+0.009);

  // ── D. 잔향 레이어: 파편 흩어짐 ─────────────────────────────────
  const tailLen = Math.floor(ac.sampleRate * (frozen?0.15:0.22));
  const tailBuf = ac.createBuffer(2, tailLen, ac.sampleRate);
  for(let ch=0; ch<2; ch++){
    const d = tailBuf.getChannelData(ch);
    for(let i=0; i<tailLen; i++){
      const tt = i/ac.sampleRate;
      d[i] = (Math.random()*2-1) * Math.exp(-tt*(frozen?24:16)) * (ch===0?1:0.88);
    }
  }
  const tailSrc = ac.createBufferSource(); tailSrc.buffer = tailBuf;
  const tailHP  = ac.createBiquadFilter(); tailHP.type='highpass'; tailHP.frequency.value=2800;
  const tailG   = ac.createGain();
  tailG.gain.setValueAtTime(0.55*intensity, now+0.008);
  tailG.gain.exponentialRampToValueAtTime(0.001, now+(frozen?0.18:0.28));
  tailSrc.connect(tailHP); tailHP.connect(tailG); tailG.connect(master);
  tailSrc.start(now+0.008);

  // ── E. 말랑이 퍽 튀는 저음 ───────────────────────────────────
  const sq = ac.createOscillator(); sq.type='sine';
  sq.frequency.setValueAtTime(frozen?55:72, now+0.010);
  sq.frequency.linearRampToValueAtTime(frozen?26:34, now+0.34);
  const sqLP = ac.createBiquadFilter(); sqLP.type='lowpass'; sqLP.frequency.value=240;
  const sqG  = ac.createGain();
  sqG.gain.setValueAtTime(0, now+0.008);
  sqG.gain.linearRampToValueAtTime(0.55*intensity, now+0.038);
  sqG.gain.exponentialRampToValueAtTime(0.001, now+0.38);
  sq.connect(sqLP); sqLP.connect(sqG); sqG.connect(master);
  sq.start(now+0.008); sq.stop(now+0.42);

  // ── F. 얼린 전용: 유리 링잉 ──────────────────────────────────
  if(frozen){
    const ring = ac.createOscillator(); ring.type='triangle';
    ring.frequency.setValueAtTime(6200, now);
    ring.frequency.exponentialRampToValueAtTime(2600, now+0.20);
    const ringG = ac.createGain();
    ringG.gain.setValueAtTime(0.28*intensity, now);
    ringG.gain.exponentialRampToValueAtTime(0.001, now+0.23);
    ring.connect(ringG); ringG.connect(master);
    ring.start(now); ring.stop(now+0.25);
  }
}

// 꾹 누르는 중간 크랙 — 부분 파열 느낌
function playMiniSnap(lv){
  const ac = getAC(), now = ac.currentTime;

  // 레벨 올라갈수록 주파수·강도 증가
  const f1 = 2800 + lv*400;
  const f2 = f1 * 1.35;
  shellCrack(ac, master, f1, 95+lv*5, 0.20+lv*0.055, now);
  shellCrack(ac, master, f2, 85+lv*4, 0.12+lv*0.032, now+0.007);
}

// ── SLANG SOUNDS ───────────────────────────────────────────────
//
// 젤리: 말랑하고 탄성 있는 고무 질감
//   → 저음 "쪽~" 어택 + 피치 드롭 + 늘어났다 돌아오는 탄성 wobble
//   → 고음 노이즈 없음. 완전히 부드럽고 촉촉한 소리.
//
// 샤베트: 얼음 결정이 부서지는 건조하고 날카로운 소리
//   → 즉각적인 고음 크런치 연타 (타닥타닥)
//   → 서걱서걱 마찰 + 얼음 파편 잔향
//   → 저음 거의 없음. 완전히 딱딱하고 건조한 소리.

// ── 젤리 레이어: 쫀득쫀득 "쪽~" ──────────────────────────────
function playJellySquish(intensity){
  const ac=getAC(), now=ac.currentTime;
  const master=ac.createDynamicsCompressor();
  master.threshold.value=-6; master.knee.value=6;
  master.ratio.value=2.5;    master.attack.value=0.002;
  master.release.value=0.12; master.connect(ac.destination);

  // A. 핵심: 쪽! 저음 임팩트 (180Hz→55Hz 피치드롭 — 탱탱한 젤리 압착)
  const impOsc=ac.createOscillator(); impOsc.type='sine';
  impOsc.frequency.setValueAtTime(180,now);
  impOsc.frequency.exponentialRampToValueAtTime(55,now+0.055);
  const impDist=ac.createWaveShaper();
  const dCurve=new Float32Array(256);
  for(let i=0;i<256;i++) dCurve[i]=Math.tanh((i/128-1)*2.8); // 부드러운 클리핑
  impDist.curve=dCurve;
  const impG=ac.createGain();
  impG.gain.setValueAtTime(0,now);
  impG.gain.linearRampToValueAtTime(1.1*intensity, now+0.004);
  impG.gain.exponentialRampToValueAtTime(0.001, now+0.09);
  impOsc.connect(impDist); impDist.connect(impG); impG.connect(master);
  impOsc.start(now); impOsc.stop(now+0.1);

  // B. 쫀득 wobble: 눌렸다가 돌아오는 탄성 (사인파 2배음)
  const wobOsc=ac.createOscillator(); wobOsc.type='sine';
  wobOsc.frequency.setValueAtTime(95,now+0.010);
  wobOsc.frequency.exponentialRampToValueAtTime(200, now+0.055); // 올라가며 탄성 복원
  wobOsc.frequency.exponentialRampToValueAtTime(110, now+0.14);
  const wobG=ac.createGain();
  wobG.gain.setValueAtTime(0, now+0.008);
  wobG.gain.linearRampToValueAtTime(0.45*intensity, now+0.022);
  wobG.gain.exponentialRampToValueAtTime(0.001, now+0.18);
  wobOsc.connect(wobG); wobG.connect(master);
  wobOsc.start(now+0.008); wobOsc.stop(now+0.20);

  // C. 젤리 표면 마찰: 매우 낮은 주파수 노이즈만 (부드럽고 촉촉)
  const fLen=Math.floor(ac.sampleRate*0.06);
  const fBuf=ac.createBuffer(1,fLen,ac.sampleRate);
  const fd=fBuf.getChannelData(0);
  for(let i=0;i<fLen;i++){
    const tt=i/ac.sampleRate;
    fd[i]=(Math.random()*2-1)*Math.exp(-tt*50);
  }
  const fSrc=ac.createBufferSource(); fSrc.buffer=fBuf;
  // 400~900Hz 대역만 — 날카로운 고음 완전 차단
  const fLP=ac.createBiquadFilter(); fLP.type='lowpass';  fLP.frequency.value=900;
  const fHP=ac.createBiquadFilter(); fHP.type='highpass'; fHP.frequency.value=200;
  const fG=ac.createGain(); fG.gain.value=0.22*intensity;
  fSrc.connect(fLP); fLP.connect(fHP); fHP.connect(fG); fG.connect(master);
  fSrc.start(now+0.004);

  // D. 탄성 복원 "탕~": 젤리가 원래 모양으로 돌아오는 잔향
  const springOsc=ac.createOscillator(); springOsc.type='triangle';
  springOsc.frequency.setValueAtTime(420,now+0.055);
  springOsc.frequency.exponentialRampToValueAtTime(180,now+0.22);
  const springLP=ac.createBiquadFilter(); springLP.type='lowpass'; springLP.frequency.value=600;
  const springG=ac.createGain();
  springG.gain.setValueAtTime(0, now+0.050);
  springG.gain.linearRampToValueAtTime(0.32*intensity, now+0.065);
  springG.gain.exponentialRampToValueAtTime(0.001, now+0.26);
  springOsc.connect(springLP); springLP.connect(springG); springG.connect(master);
  springOsc.start(now+0.050); springOsc.stop(now+0.28);
}

// ── 샤베트 레이어: 얼음 결정 와사삭 ──────────────────────────
function playSherbetCrunch(intensity){
  const ac=getAC(), now=ac.currentTime;
  const master=ac.createDynamicsCompressor();
  master.threshold.value=-4; master.knee.value=2;
  master.ratio.value=5;      master.attack.value=0.0005;
  master.release.value=0.04; master.connect(ac.destination);

  // A. 핵심: 얼음 결정 연타 크런치 (타닥타닥 — 5~7kHz 고음 클릭 연속)
  // 실제 얼음/샤베트: 매우 빠른 어택(<2ms), 고음 지배, 잔향 없이 즉각 소멸
  const numClicks=4+Math.floor(intensity*3);
  for(let k=0;k<numClicks;k++){
    const clickLen=Math.floor(ac.sampleRate*0.018); // 18ms 극단적으로 짧음
    const cBuf=ac.createBuffer(2,clickLen,ac.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=cBuf.getChannelData(ch);
      for(let i=0;i<clickLen;i++){
        const tt=i/ac.sampleRate;
        // 즉각 어택(0~1ms) + 초고속 감쇠
        const env= tt<0.001 ? tt/0.001 : Math.exp(-(tt-0.001)*180);
        d[i]=(Math.random()*2-1)*env*(ch===0?1:0.88+Math.random()*0.1);
      }
    }
    const cSrc=ac.createBufferSource(); cSrc.buffer=cBuf;
    // 4kHz~9kHz 대역 부스트 — 얼음 결정 고음
    const cHP=ac.createBiquadFilter(); cHP.type='highpass';  cHP.frequency.value=3800;
    const cPK=ac.createBiquadFilter(); cPK.type='peaking';   cPK.frequency.value=5500+k*400; cPK.Q.value=1.2; cPK.gain.value=12;
    const cLP=ac.createBiquadFilter(); cLP.type='lowpass';   cLP.frequency.value=10000;
    const cG=ac.createGain(); cG.gain.value=(0.9-k*0.08)*intensity;
    cSrc.connect(cHP); cHP.connect(cPK); cPK.connect(cLP); cLP.connect(cG); cG.connect(master);
    cSrc.start(now + k*0.014 + Math.random()*0.004); // 불규칙 간격
  }

  // B. 얼음 표면 서걱서걱: 짧은 고주파 마찰음
  const scrLen=Math.floor(ac.sampleRate*0.055);
  const scrBuf=ac.createBuffer(2,scrLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=scrBuf.getChannelData(ch);
    for(let i=0;i<scrLen;i++){
      const tt=i/ac.sampleRate;
      // 짧은 어택 후 서서히 감쇠 — 표면 긁히는 느낌
      const env=tt<0.003?tt/0.003:Math.exp(-(tt-0.003)*28);
      // 고주파 노이즈에 진폭 변조 걸어서 "서걱" 질감
      const mod=0.5+0.5*Math.sin(tt*1200);
      d[i]=(Math.random()*2-1)*env*mod*(ch===0?1:0.90+Math.random()*0.08);
    }
  }
  const scrSrc=ac.createBufferSource(); scrSrc.buffer=scrBuf;
  const scrHP=ac.createBiquadFilter(); scrHP.type='highpass'; scrHP.frequency.value=5000;
  const scrLP=ac.createBiquadFilter(); scrLP.type='lowpass';  scrLP.frequency.value=12000;
  const scrG=ac.createGain(); scrG.gain.value=0.7*intensity;
  scrSrc.connect(scrHP); scrHP.connect(scrLP); scrLP.connect(scrG); scrG.connect(master);
  scrSrc.start(now+0.008);

  // C. 얼음 파편 잔향: 깨진 조각들 굴러가는 소리 (고음, 아주 짧게)
  const tailLen=Math.floor(ac.sampleRate*0.08);
  const tBuf=ac.createBuffer(2,tailLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=tBuf.getChannelData(ch);
    for(let i=0;i<tailLen;i++){
      const tt=i/ac.sampleRate;
      d[i]=(Math.random()*2-1)*Math.exp(-tt*55)*(ch===0?1:0.85);
    }
  }
  const tSrc=ac.createBufferSource(); tSrc.buffer=tBuf;
  const tHP=ac.createBiquadFilter(); tHP.type='highpass'; tHP.frequency.value=4200;
  const tG=ac.createGain();
  tG.gain.setValueAtTime(0.35*intensity, now+0.030);
  tG.gain.exponentialRampToValueAtTime(0.001, now+0.12);
  tSrc.connect(tHP); tHP.connect(tG); tG.connect(master);
  tSrc.start(now+0.030);

  // D. 얼음 임팩트 저역: 단 한 방, 매우 짧고 둔탁하게 (얼음 덩어리 충격)
  // 젤리의 부드러운 저음과 달리 — 뭉툭하고 즉각 소멸
  const impOsc=ac.createOscillator(); impOsc.type='sine';
  impOsc.frequency.setValueAtTime(120,now);
  impOsc.frequency.exponentialRampToValueAtTime(60,now+0.03); // 매우 짧게
  const impG=ac.createGain();
  impG.gain.setValueAtTime(0,now);
  impG.gain.linearRampToValueAtTime(0.55*intensity,now+0.002);
  impG.gain.exponentialRampToValueAtTime(0.001,now+0.04); // 0.04초만에 소멸
  impOsc.connect(impG); impG.connect(master);
  impOsc.start(now); impOsc.stop(now+0.045);
}

// 샤베트 최종 폭발: 얼음 대량 파쇄 + 저음 충격
function playSherbetBurst(intensity){
  const ac=getAC(), now=ac.currentTime;
  const master=ac.createDynamicsCompressor();
  master.threshold.value=-3; master.knee.value=2;
  master.ratio.value=6;      master.attack.value=0.0005;
  master.release.value=0.05; master.connect(ac.destination);

  // 얼음 대량 파쇄 연타 (8~10개)
  const numClicks=8+Math.floor(intensity*4);
  for(let k=0;k<numClicks;k++){
    const cLen=Math.floor(ac.sampleRate*0.016);
    const cBuf=ac.createBuffer(2,cLen,ac.sampleRate);
    for(let ch=0;ch<2;ch++){
      const d=cBuf.getChannelData(ch);
      for(let i=0;i<cLen;i++){
        const tt=i/ac.sampleRate;
        const env=tt<0.0008?tt/0.0008:Math.exp(-(tt-0.0008)*220);
        d[i]=(Math.random()*2-1)*env*(ch===0?1:0.85+Math.random()*0.12);
      }
    }
    const cSrc=ac.createBufferSource(); cSrc.buffer=cBuf;
    const cHP=ac.createBiquadFilter(); cHP.type='highpass'; cHP.frequency.value=3500+k*200;
    const cPK=ac.createBiquadFilter(); cPK.type='peaking';  cPK.frequency.value=5500+k*350; cPK.Q.value=1.0; cPK.gain.value=10;
    const cG=ac.createGain(); cG.gain.value=(1.1-k*0.07)*intensity;
    cSrc.connect(cHP); cHP.connect(cPK); cPK.connect(cG); cG.connect(master);
    cSrc.start(now + k*0.012 + Math.random()*0.006);
  }

  // 서걱 마찰 파도
  const scrLen=Math.floor(ac.sampleRate*0.12);
  const scrBuf=ac.createBuffer(2,scrLen,ac.sampleRate);
  for(let ch=0;ch<2;ch++){
    const d=scrBuf.getChannelData(ch);
    for(let i=0;i<scrLen;i++){
      const tt=i/ac.sampleRate;
      const env=tt<0.005?tt/0.005:Math.exp(-(tt-0.005)*18);
      const mod=0.5+0.5*Math.sin(tt*800+ch*1.2);
      d[i]=(Math.random()*2-1)*env*mod;
    }
  }
  const scrSrc=ac.createBufferSource(); scrSrc.buffer=scrBuf;
  const scrHP=ac.createBiquadFilter(); scrHP.type='highpass'; scrHP.frequency.value=4800;
  const scrG=ac.createGain(); scrG.gain.value=0.9*intensity;
  scrSrc.connect(scrHP); scrHP.connect(scrG); scrG.connect(master);
  scrSrc.start(now+0.005);

  // 얼음 충격 저역 (단 1방, 즉각 소멸)
  const impOsc=ac.createOscillator(); impOsc.type='sine';
  impOsc.frequency.setValueAtTime(140,now);
  impOsc.frequency.exponentialRampToValueAtTime(42,now+0.045);
  const impG=ac.createGain();
  impG.gain.setValueAtTime(0,now);
  impG.gain.linearRampToValueAtTime(1.2*intensity,now+0.002);
  impG.gain.exponentialRampToValueAtTime(0.001,now+0.055);
  impOsc.connect(impG); impG.connect(master);
  impOsc.start(now); impOsc.stop(now+0.06);
}

// 젤리 최대 압착: 터지지 않고 "쫀득~" 하고 돌아오는 소리
function playJellyMaxSquish(intensity){
  const ac=getAC(), now=ac.currentTime;
  const master=ac.createDynamicsCompressor();
  master.threshold.value=-6; master.knee.value=6;
  master.ratio.value=2.5;    master.attack.value=0.002;
  master.release.value=0.15; master.connect(ac.destination);

  // 최대 압착 저음 임팩트 (더 크고 둔탁하게)
  const impOsc=ac.createOscillator(); impOsc.type='sine';
  impOsc.frequency.setValueAtTime(155,now);
  impOsc.frequency.exponentialRampToValueAtTime(42,now+0.08);
  const impDist=ac.createWaveShaper();
  const dc=new Float32Array(256);
  for(let i=0;i<256;i++) dc[i]=Math.tanh((i/128-1)*3.2);
  impDist.curve=dc;
  const impG=ac.createGain();
  impG.gain.setValueAtTime(0,now);
  impG.gain.linearRampToValueAtTime(1.3*intensity,now+0.005);
  impG.gain.exponentialRampToValueAtTime(0.001,now+0.12);
  impOsc.connect(impDist); impDist.connect(impG); impG.connect(master);
  impOsc.start(now); impOsc.stop(now+0.14);

  // 크고 탄성있는 wobble (쫀득하게 되돌아오는 느낌)
  const w1=ac.createOscillator(); w1.type='sine';
  w1.frequency.setValueAtTime(70,now+0.018);
  w1.frequency.exponentialRampToValueAtTime(280,now+0.10); // 팡~ 올라가며 복원
  w1.frequency.exponentialRampToValueAtTime(130,now+0.30);
  const w1G=ac.createGain();
  w1G.gain.setValueAtTime(0,now+0.015);
  w1G.gain.linearRampToValueAtTime(0.7*intensity,now+0.035);
  w1G.gain.exponentialRampToValueAtTime(0.001,now+0.36);
  w1.connect(w1G); w1G.connect(master);
  w1.start(now+0.015); w1.stop(now+0.38);

  // 2차 wobble (쫀득 여운)
  const w2=ac.createOscillator(); w2.type='triangle';
  w2.frequency.setValueAtTime(220,now+0.08);
  w2.frequency.exponentialRampToValueAtTime(95,now+0.35);
  const w2LP=ac.createBiquadFilter(); w2LP.type='lowpass'; w2LP.frequency.value=500;
  const w2G=ac.createGain();
  w2G.gain.setValueAtTime(0,now+0.075);
  w2G.gain.linearRampToValueAtTime(0.38*intensity,now+0.095);
  w2G.gain.exponentialRampToValueAtTime(0.001,now+0.42);
  w2.connect(w2LP); w2LP.connect(w2G); w2G.connect(master);
  w2.start(now+0.075); w2.stop(now+0.44);

  // 젤리 표면 촉촉한 저주파 마찰 잔향
  const tLen=Math.floor(ac.sampleRate*0.18);
  const tBuf=ac.createBuffer(1,tLen,ac.sampleRate);
  const td=tBuf.getChannelData(0);
  for(let i=0;i<tLen;i++){
    const tt=i/ac.sampleRate;
    td[i]=(Math.random()*2-1)*Math.exp(-tt*14);
  }
  const tSrc=ac.createBufferSource(); tSrc.buffer=tBuf;
  const tLP=ac.createBiquadFilter(); tLP.type='lowpass'; tLP.frequency.value=700;
  const tG=ac.createGain(); tG.gain.value=0.18*intensity;
  tSrc.connect(tLP); tLP.connect(tG); tG.connect(master);
  tSrc.start(now+0.012);
}

// ── HOLD RING ──────────────────────────────────────────────────
function updateRing(p){
  const offset=RING_CIRC*(1-p);
  holdRingPath.style.strokeDashoffset=offset;
  if(p>0.01){
    if(isSlang){
      // 슬랑이: 라임/연두 링
      const g2=Math.round(220-p*60);
      holdRingPath.style.stroke=`rgba(120,${g2},60,${0.75+p*0.25})`;
    } else {
      const g2=Math.round(211-p*80);
      const b2=Math.round(153-p*100);
      holdRingPath.style.stroke=`rgba(52,${g2},${Math.max(30,b2)},${0.75+p*0.25})`;
    }
  } else {
    holdRingPath.style.stroke='rgba(52,211,153,0)';
  }
}

// ── HOLD LOOP ──────────────────────────────────────────────────
function holdLoop(){
  if(!isPressingDown){holdRafId=null;return;}
  const elapsed=(performance.now()-pressStart)/1000;

  if(isSlang && isFrozen){
    // ── 슬랑이 아이스바: 전체 샤베트, 어디 눌러도 아삭 ──
    const iceTotal=1.30;
    pressFactor=Math.min(1, elapsed/0.18);
    holdProgress=Math.min(1, elapsed/iceTotal);
    updateRing(holdProgress);
    const intervals=[0.12,0.24,0.38,0.52,0.64,0.76,0.88];
    for(let i=0;i<intervals.length;i++){
      const thr=intervals[i];
      if(holdProgress>=thr && lastCrackAt<thr && !isCracking){
        lastCrackAt=thr;
        if(i===intervals.length-1){triggerFullCrack();return;}
        icebarCrackLevel=i+1;
        playIcebarCrunch(0.55+icebarCrackLevel*0.08);
        if(navigator.vibrate) navigator.vibrate([4,2,8,2,5]);
        const pre=['❄️ 아삭!','아삭아삭! ❄️','우드득 ❄️','쩍! 금 갔어!','조각나고 있어! 💥','거의 다야!! ❄️','지금이야!! 💥'];
        setStatus(pre[Math.min(i,pre.length-1)]);
        spawnSherbetMiniParticles();
      }
    }
    drawSlangIcebar(icebarCrackLevel, pressX, pressY, pressFactor);

  } else if(isSlang){
    const onSherbet=pressOnSherbet;

    if(!onSherbet){
      // ── 젤리 레이어: 게이지 없음, 크랙 없음, 그냥 눌림만 표현 ──
      pressFactor=Math.min(0.72, elapsed/0.12); // 0.12초만에 최대 압착
      drawSlang(0, sherbetCrackLevel, pressX, pressY, pressFactor);
      holdRafId=requestAnimationFrame(holdLoop);
      return;
    }

    // ── 샤베트 레이어: 게이지 끝까지 차고 터짐 ──
    const sherbetTotal=1.10;
    pressFactor=Math.min(1, elapsed/0.20);
    holdProgress=Math.min(1, elapsed/sherbetTotal);
    updateRing(holdProgress);

    const intervals=[0.14,0.28,0.43,0.57,0.70,0.83,1.00];
    for(let i=0;i<intervals.length;i++){
      const thr=intervals[i];
      if(holdProgress>=thr && lastCrackAt<thr && !isCracking){
        lastCrackAt=thr;
        if(i===intervals.length-1){ triggerFullCrack(); return; }
        sherbetCrackLevel=i+1;
        playSherbetCrunch(0.45+sherbetCrackLevel*0.09);
        if(navigator.vibrate) navigator.vibrate([5,3,10,3,6]);
        const pre=['얼음에 금이...❄️','쩌드득! ❄️','샤베트 갈라져!','쩍쩍! ❄️','조각나고 있어! 💥','거의 다야!! ❄️','지금이야!! 💥'];
        setStatus(pre[Math.min(i,pre.length-1)]);
        spawnSherbetMiniParticles();
      }
    }
    drawSlang(jellyCrackLevel, sherbetCrackLevel, pressX, pressY, pressFactor);

  } else {
    const total=isFrozen?0.85:1.55;
    pressFactor=Math.min(1,elapsed/0.20);
    holdProgress=Math.min(1,elapsed/total);
    updateRing(holdProgress);
    const intervals=isFrozen
      ?[0.14,0.28,0.42,0.55,0.66,0.78,0.88]
      :[0.16,0.32,0.48,0.62,0.73,0.83,0.91];
    for(let i=0;i<intervals.length;i++){
      const thr=intervals[i];
      if(holdProgress>=thr && lastCrackAt<thr && !isCracking){
        lastCrackAt=thr;
        if(i===intervals.length-1){triggerFullCrack();return;}
        crackLevel=i+1;
        playMiniSnap(crackLevel);
        if(navigator.vibrate) navigator.vibrate(12);
        const pre=['꽉 쥐어봐! 👊','금이 가고 있어! 🫧','좀 더! 💪','거의 다 됐어! 😤','터지기 직전! 🔥','으득... 💢','지금이야!! 💥'];
        setStatus(pre[Math.min(i,pre.length-1)]);
        spawnParticles(false);
      }
    }
    drawBall(crackLevel,isFrozen,pressX,pressY,pressFactor);
  }
  holdRafId=requestAnimationFrame(holdLoop);
}

function startPress(px,py){
  if(isCracking)return;
  isPressingDown=true;pressX=px;pressY=py;py_last=py;
  pressStart=performance.now();holdProgress=0;lastCrackAt=0;
  if(isSlang && isFrozen){
    // 아이스바: 어디든 아삭
    playIcebarCrunch(0.28);
  } else if(isSlang){
    pressOnSherbet=isOnSherbet(px,py);
    if(!pressOnSherbet) playJellySquish(0.55);
  }
  cancelAnimationFrame(holdRafId);
  holdRafId=requestAnimationFrame(holdLoop);
}

function endPress(){
  if(!isPressingDown)return;
  isPressingDown=false;cancelAnimationFrame(holdRafId);holdRafId=null;
  if(isSlang && !isFrozen && !pressOnSherbet) playJellySquish(0.42);
  updateRing(0);
  const startF=pressFactor,startT=performance.now();
  function spring(){
    const el=(performance.now()-startT)/1000;
    pressFactor=Math.max(0,startF*(1-el/0.18));
    if(isSlang && isFrozen) drawSlangIcebar(icebarCrackLevel,pressX,pressY,pressFactor);
    else if(isSlang) drawSlang(jellyCrackLevel,sherbetCrackLevel,pressX,pressY,pressFactor);
    else drawBall(crackLevel,isFrozen,pressX,pressY,pressFactor);
    if(pressFactor>0.008)requestAnimationFrame(spring);
    else{
      pressFactor=0;
      if(isSlang && isFrozen) drawSlangIcebar(icebarCrackLevel,0,0,0);
      else if(isSlang) drawSlang(jellyCrackLevel,sherbetCrackLevel,0,0,0);
      else drawBall(crackLevel,isFrozen,0,0,0);
    }
  }
  requestAnimationFrame(spring);
}

function triggerFullCrack(){
  isPressingDown=false;cancelAnimationFrame(holdRafId);holdRafId=null;
  pressFactor=0;updateRing(0);
  isCracking=true;crackCount++;cntEl.textContent=crackCount;
  streakCount++;streakEl.textContent=streakCount;
  currentCrackPoly=null;

  // 스트릭 타이머 재시작
  resetStreakTimer();

  if(isSlang && isFrozen){
    // 아이스바: 와장창! 얼음 전체 박살
    playIcebarBurst(1.0);
    spawnIcebarParticles();
  } else if(isSlang){
    // 슬랑이 일반: 샤베트 레이어 터짐
    playSherbetBurst(0.95);
    spawnSlangParticles();
  } else {
    playWageujeok(isFrozen?1.0:0.85,isFrozen);
    setTimeout(()=>{showMalang();launchPieces();},42);
  }

  // shake — 더 강하게
  let sf=0;
  const seq=[[5,-4],[-7,5],[4,-5],[-5,4],[3,-2],[-2,2],[1,-1],[0,0]];
  function shake(){
    if(sf>=seq.length){scene.style.transform='';return;}
    const[sx,sy]=seq[sf++];
    scene.style.transform=`translate(${sx}px,${sy}px)`;
    setTimeout(shake,34);
  }
  shake();
  doFlash();
  if(!isSlang) spawnParticles(true);
  if(navigator.vibrate) navigator.vibrate([30,10,70,15,50,10,30,8,20]);
  setStatus(getMsg());

  checkUnlocks(crackCount);
  saveState();

  setTimeout(()=>{
    crackLevel=0;jellyCrackLevel=0;sherbetCrackLevel=0;icebarCrackLevel=0;
    isCracking=false;holdProgress=0;lastCrackAt=0;
    jellyCrackPoly=null;sherbetCrackPoly=null;currentCrackPoly=null;icebarCrackPoly=null;
    if(isSlang && isFrozen){ drawSlangIcebar(0,0,0,0); }
    else if(isSlang){ genSlangSherbetPos(); drawSlang(0,0,0,0,0); }
    else drawBall(0,isFrozen,0,0,0);
  },720);
}

function checkUnlocks(n){
  FLAVORS.forEach((f,i)=>{
    if(!unlocked[i] && n>=f.unlock){
      unlocked[i]=true;
      const fi=document.getElementById('fi'+i);
      fi.classList.remove('locked');
      fi.querySelector('.lock')?.remove();
      const ua=document.getElementById('ua'+i);
      if(ua) ua.remove();
      showUnlockToast(f.name);
    }
  });
  // 가장 가까운 잠금 해제 임박 알림 (3개 이내)
  const nextLock=FLAVORS.find((f,i)=>!unlocked[i] && f.unlock>0);
  if(nextLock){
    const remaining=nextLock.unlock - n;
    if(remaining>0 && remaining<=3){
      const em=nextLock.name.split(' ')[0];
      setTimeout(()=>setStatus(`${em} 해금까지 ${remaining}개만 더! 🎯`),800);
    }
  }
}
function showUnlockToast(name){
  const t=document.getElementById('unlockToast');
  document.getElementById('utEmoji').textContent=name.split(' ')[0];
  document.getElementById('utText').textContent=`${name} 잠금 해제!`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

function getPressPos(e){
  const rect=scene.getBoundingClientRect();
  const sx=rect.width/W,sy=rect.height/H;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy2=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-rect.left)/sx,y:(cy2-rect.top)/sy};
}

  const{x,y}=getPressPos(e);

      drawSlangIcebar(0,0,0,0);

      hintEl.textContent='전체가 샤베트! 어디든 눌러봐 ❄️';
    } else {
      genSlangSherbetPos();
      drawSlang(0,0,0,0,0);
      setStatus('쫀득한 슬랑이~ 꾹 눌러봐! 💚');
      hintEl.textContent='흰 부분=와사삭❄️  연두 부분=쫀득💚';
    }
    applySlangColorBtn();
    flavorBtn.style.display='none';
  } else {
    btn.classList.remove('active');
    btn.innerHTML='🫧 슬랑이'+(slangUsed?'':'<span class="new-badge">NEW</span>');
    document.getElementById('slangColorBtn').className='btn btn-slang-color';
    holdRingPath.setAttribute('stroke','#34d399');
    drawBall(0,isFrozen,0,0,0);
    setStatus('왁뿌볼로 돌아왔어! 꾹 눌러봐 🤜');
    hintEl.textContent=isFrozen?'얼리면 더 선명한 우드득!':'❄️ 얼리면 더 선명해요';
    flavorBtn.style.display='';
  }
}
function resetBall(){
  endPress();
  crackLevel=0;jellyCrackLevel=0;sherbetCrackLevel=0;icebarCrackLevel=0;
  isCracking=false;pressFactor=0;holdProgress=0;lastCrackAt=0;
  jellyCrackPoly=null;sherbetCrackPoly=null;currentCrackPoly=null;icebarCrackPoly=null;
  piecesDiv.innerHTML='';
  if(isSlang && isFrozen){
    drawSlangIcebar(0,0,0,0);
    setStatus('새 아이스바! 아삭아삭~ 🍦');
    hintEl.textContent='전체가 샤베트! 어디든 눌러봐 ❄️';
  } else if(isSlang){
    genSlangSherbetPos();
    drawSlang(0,0,0,0,0);
    setStatus('새 슬랑이! 꾹 눌러봐 💚');
    hintEl.textContent='흰 부분=와사삭❄️  연두 부분=쫀득💚';
  } else {
    drawBall(0,isFrozen,0,0,0);
    hintEl.textContent=isFrozen?'얼리면 더 선명한 우드득!':'❄️ 얼리면 더 선명해요';
    setStatus('새 왁뿌볼이야! 눌러봐 🤜');
  }
}

// ── ONBOARDING ─────────────────────────────────────────────────
let _obStep=1;
function obNext(){
  document.getElementById('ob'+_obStep).classList.remove('active');
  document.getElementById('od'+_obStep).classList.remove('on');
  _obStep++;
  document.getElementById('ob'+_obStep).classList.add('active');
  document.getElementById('od'+_obStep).classList.add('on');
}
function dismissOnboarding(){
  document.getElementById('onboarding').classList.add('gone');
  setTimeout(()=>demoPress(),400);
}
function demoPress(){
  if(isCracking)return;
  let t=0;
  const DEMO_X=CX,DEMO_Y=CY+20;
  pressX=DEMO_X;pressY=DEMO_Y;py_last=DEMO_Y;
  const dur=600;
  function step(){
    t+=16;
    const prog=Math.min(t/dur,1);
    const pf=prog<0.5?prog*2:(1-prog)*2;
    pressFactor=pf;
    drawBall(0,isFrozen,DEMO_X,DEMO_Y,pf);
    if(prog<1)requestAnimationFrame(step);
    else{pressFactor=0;drawBall(0,isFrozen,0,0,0);setStatus('이렇게 꾹 눌러봐! 🤜');}
  }
  requestAnimationFrame(step);
}

// ── INIT ───────────────────────────────────────────────────────
drawBall(0,false,0,0,0);
