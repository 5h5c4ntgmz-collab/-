<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>왁뿌볼</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka:wght@400;500;600;700&family=Nunito:wght@400;600;700;900&display=swap');

:root{
  --bg: #f0fdf4;
  --surface: rgba(255,255,255,0.82);
  --accent1: #34d399;
  --accent2: #6ee7b7;
  --accent3: #a7f3d0;
  --lime: #bef264;
  --mint: #ccfbf1;
  --sky: #e0f2fe;
  --text: #064e3b;
  --subtext: #6ee7b7;
  --subtext-dark: #059669;
  --radius: 20px;
  --scene-size: min(260px, 58vw);
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  background: var(--bg);
  background-image:
    radial-gradient(ellipse 90% 60% at 15% -5%, rgba(167,243,208,0.6), transparent),
    radial-gradient(ellipse 70% 50% at 85% 105%, rgba(190,242,100,0.35), transparent),
    radial-gradient(ellipse 50% 40% at 50% 50%, rgba(204,251,241,0.3), transparent);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  font-family:'Nunito',sans-serif;
  overflow:hidden;
  user-select:none;-webkit-user-select:none;-webkit-tap-highlight-color:transparent;
  padding: 70px 0 16px;
}

/* ── TOP BAR ── */
.topbar{
  position:fixed;top:0;left:0;right:0;
  display:flex;align-items:center;justify-content:space-between;
  padding:12px 16px 0;
  z-index:50;
}
.pill{
  display:flex;align-items:center;gap:6px;
  background:var(--surface);
  backdrop-filter:blur(14px);
  -webkit-backdrop-filter:blur(14px);
  border:1.5px solid rgba(110,231,183,0.45);
  border-radius:999px;
  padding:6px 14px;
  font-weight:700;font-size:.82rem;color:var(--subtext-dark);
  box-shadow:0 2px 14px rgba(52,211,153,0.13);
}
.pill-val{font-size:1.05rem;color:var(--text);font-weight:900;}
.pill-fire{color:#f59e0b;}

/* ── TITLE ── */
.title-wrap{text-align:center;margin-bottom:clamp(12px,3vw,22px);}
h1{
  font-family:'Fredoka',sans-serif;
  font-size:clamp(1.5rem,5.5vw,2.4rem);
  color:var(--text);
  letter-spacing:0.5px;
  line-height:1;
  text-shadow: 0 2px 12px rgba(52,211,153,0.18);
}
.sub{
  font-size:clamp(.78rem,.8rem,.88rem);font-weight:700;
  color:var(--subtext-dark);
  margin-top:4px;
  letter-spacing:0.04em;
}

/* ── SCENE ── */
.scene{
  position:relative;
  width:var(--scene-size);height:var(--scene-size);
  cursor:pointer;touch-action:none;
  filter:drop-shadow(0 18px 36px rgba(52,211,153,0.28)) drop-shadow(0 4px 10px rgba(0,0,0,0.07));
  flex-shrink:0;
}
#cv{position:absolute;inset:0;width:100%;height:100%;}
#piecesDiv{position:absolute;inset:0;pointer-events:none;overflow:visible;}

/* hold ring */
#holdRing{
  position:absolute;
  top:-3.8%;left:-3.8%;
  width:107.6%;height:107.6%;
  pointer-events:none;
}

/* ── STATUS ── */
.status-wrap{margin-top:clamp(12px,2.5vw,20px);text-align:center;height:2rem;}
.status{
  font-size:clamp(.95rem,1.05rem,1.1rem);font-weight:800;
  color:var(--text);
  display:inline-block;
  transition:opacity .15s;
}
.hint{font-size:.76rem;color:var(--subtext-dark);margin-top:3px;font-weight:700;opacity:0.8;}

/* ── CONTROLS ── */
.controls{
  display:flex;gap:8px;margin-top:clamp(14px,3vw,22px);
  flex-wrap:wrap;justify-content:center;
  max-width:320px;
  padding:0 8px;
}
.btn{
  font-family:'Nunito',sans-serif;
  font-size:clamp(.8rem,.88rem,.92rem);font-weight:800;
  padding:11px 18px;
  border-radius:16px;border:none;cursor:pointer;
  transition:transform .12s,box-shadow .12s,filter .12s;
  letter-spacing:0.01em;
}
.btn:active{transform:scale(.93)!important;filter:brightness(.95);}
.btn:hover{transform:translateY(-2px);box-shadow:0 8px 20px rgba(0,0,0,.10);}

.btn-freeze{
  background:linear-gradient(135deg,#a7f3d0,#34d399);
  color:#064e3b;
  box-shadow:0 4px 14px rgba(52,211,153,.35);
}
.btn-reset{
  background:linear-gradient(135deg,#d9f99d,#84cc16);
  color:#365314;
  box-shadow:0 4px 14px rgba(132,204,22,.30);
}
.btn-flavor{
  background:linear-gradient(135deg,#ccfbf1,#2dd4bf);
  color:#134e4a;
  box-shadow:0 4px 14px rgba(45,212,191,.30);
}

/* ── FLASH ── */
#flash{position:fixed;inset:0;background:linear-gradient(135deg,#d1fae5,#ecfdf5);opacity:0;pointer-events:none;transition:opacity .06s;z-index:999;}
#pts{position:fixed;inset:0;pointer-events:none;overflow:hidden;}
.pt{position:absolute;pointer-events:none;}

/* ── ONBOARDING ── */
#onboarding{
  position:fixed;inset:0;
  background:rgba(2,44,34,0.55);
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  z-index:300;gap:12px;
}
#onboarding.gone{display:none;}
.ob-card{
  background:linear-gradient(145deg,#ffffff,#f0fdf4);
  border-radius:28px;
  border:1.5px solid rgba(110,231,183,0.4);
  padding:32px 28px;max-width:300px;width:88%;
  display:flex;flex-direction:column;align-items:center;gap:14px;text-align:center;
  box-shadow:0 32px 80px rgba(6,78,59,0.2), 0 0 0 1px rgba(255,255,255,0.8);
}
.ob-emoji{font-size:3rem;animation:obBounce 1.3s ease-in-out infinite;}
@keyframes obBounce{0%,100%{transform:translateY(0) scale(1);}50%{transform:translateY(14px) scale(0.88);}}
.ob-title{font-family:'Fredoka',sans-serif;font-size:1.9rem;color:#064e3b;letter-spacing:0.5px;}
.ob-sub{font-size:.93rem;color:#059669;line-height:1.55;font-weight:600;}
.ob-btn{
  font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;
  padding:14px 36px;border-radius:16px;border:none;
  background:linear-gradient(135deg,#34d399,#059669);
  color:white;cursor:pointer;
  box-shadow:0 6px 22px rgba(52,211,153,.45);
  margin-top:4px;transition:transform .12s;
}
.ob-btn:active{transform:scale(.95);}

/* ── UNLOCK TOAST ── */
#unlockToast{
  position:fixed;top:72px;left:50%;
  transform:translateX(-50%) translateY(-16px);
  background:linear-gradient(135deg,#ecfdf5,#ffffff);
  border-radius:16px;padding:11px 18px;
  box-shadow:0 8px 28px rgba(52,211,153,0.22);
  display:flex;align-items:center;gap:10px;
  opacity:0;transition:opacity .28s,transform .28s;
  z-index:400;pointer-events:none;
  border:1.5px solid rgba(110,231,183,0.5);
}
#unlockToast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.ut-emoji{font-size:1.8rem;}
.ut-text{font-size:.88rem;font-weight:800;color:#064e3b;}

/* ── FLAVOR POPUP ── */
.popup{
  display:none;position:fixed;inset:0;
  background:rgba(2,44,34,0.4);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  align-items:center;justify-content:center;z-index:200;
}
.popup.open{display:flex;}
.popup-box{
  background:linear-gradient(145deg,#ffffff,#f0fdf4);
  border-radius:24px;padding:22px;
  display:grid;grid-template-columns:repeat(3,1fr);gap:10px;
  max-width:310px;width:92%;
  box-shadow:0 20px 60px rgba(6,78,59,0.18);
  border:1.5px solid rgba(110,231,183,0.35);
}
.popup-title{
  grid-column:1/-1;font-weight:900;font-size:1.05rem;
  font-family:'Fredoka',sans-serif;letter-spacing:0.5px;
  color:#064e3b;text-align:center;margin-bottom:2px;
}
.fi{
  display:flex;flex-direction:column;align-items:center;gap:4px;
  padding:11px 6px;border-radius:14px;cursor:pointer;
  border:2px solid transparent;transition:background .12s,transform .1s,border-color .12s;
  position:relative;
}
.fi:hover{background:#ecfdf5;transform:scale(1.05);}
.fi.sel{border-color:#34d399;background:#d1fae5;}
.fi.locked{opacity:0.4;cursor:default;}
.fi .em{font-size:1.8rem;}
.fi .nm{font-size:.72rem;color:#059669;font-weight:700;}
.fi .lock{position:absolute;top:4px;right:4px;font-size:.65rem;}
.fi .unlock-at{
  font-size:.6rem;color:#6ee7b7;font-weight:700;margin-top:-2px;
}
</style>
</head>
<body>

<div id="flash"></div>
<div id="pts"></div>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-card">
    <div class="ob-emoji">👆</div>
    <div class="ob-title">왁뿌볼 🫧</div>
    <div class="ob-sub">꾹 눌러서<br>왁스를 부숴봐요!</div>
    <button class="ob-btn" onclick="dismissOnboarding()">해볼게요!</button>
  </div>
</div>

<!-- UNLOCK TOAST -->
<div id="unlockToast">
  <div class="ut-emoji" id="utEmoji"></div>
  <div class="ut-text" id="utText"></div>
</div>

<!-- TOP BAR -->
<div class="topbar">
  <div class="pill">
    <span class="pill-fire">🔥</span>
    연속&nbsp;<span class="pill-val" id="streakNum">0</span>
  </div>
  <div class="pill">
    오늘&nbsp;<span class="pill-val" id="cnt">0</span>
  </div>
</div>

<!-- MAIN -->
<div class="title-wrap">
  <h1>왁뿌볼 🫧</h1>
  <p class="sub">꾹 눌러서 우드득~</p>
</div>

<div class="scene" id="scene">
  <svg id="holdRing" viewBox="0 0 280 280" style="pointer-events:none;">
    <circle cx="140" cy="140" r="128" fill="none" stroke="rgba(167,243,208,0.6)" stroke-width="4"/>
    <circle id="holdRingPath" cx="140" cy="140" r="128"
      fill="none" stroke-width="5" stroke-linecap="round"
      stroke-dasharray="804" stroke-dashoffset="804"
      stroke="#34d399"
      style="transform-origin:140px 140px;transform:rotate(-90deg);transition:stroke-dashoffset 0.05s linear,stroke 0.2s;"/>
  </svg>
  <canvas id="cv" width="260" height="260"></canvas>
  <div id="piecesDiv"></div>
</div>

<div class="status-wrap">
  <div class="status" id="status">꾹 눌러봐! 🤜</div>
</div>
<div class="hint" id="hint">❄️ 얼리면 더 선명해요</div>

<div class="controls">
  <button class="btn btn-freeze" id="freezeBtn" onclick="toggleFreeze()">❄️ 냉동실</button>
  <button class="btn btn-flavor" onclick="openPop()">🎨 향 바꾸기</button>
  <button class="btn btn-reset" onclick="resetBall()">🔄 새 왁뿌볼</button>
</div>

<!-- FLAVOR POPUP -->
<div class="popup" id="popup" onclick="closePop(event)">
  <div class="popup-box">
    <div class="popup-title">향 선택 ✨</div>
    <div class="fi sel" id="fi0" onclick="tryFlavor(0)"><div class="em">🍏</div><div class="nm">청사과</div></div>
    <div class="fi" id="fi1" onclick="tryFlavor(1)"><div class="em">🍓</div><div class="nm">딸기</div></div>
    <div class="fi locked" id="fi2" onclick="tryFlavor(2)"><div class="em">🍇</div><div class="nm">포도</div><div class="lock">🔒</div><div class="unlock-at" id="ua2"></div></div>
    <div class="fi locked" id="fi3" onclick="tryFlavor(3)"><div class="em">🍑</div><div class="nm">복숭아</div><div class="lock">🔒</div><div class="unlock-at" id="ua3"></div></div>
    <div class="fi locked" id="fi4" onclick="tryFlavor(4)"><div class="em">🍋</div><div class="nm">레몬</div><div class="lock">🔒</div><div class="unlock-at" id="ua4"></div></div>
    <div class="fi locked" id="fi5" onclick="tryFlavor(5)"><div class="em">🫐</div><div class="nm">블루베리</div><div class="lock">🔒</div><div class="unlock-at" id="ua5"></div></div>
  </div>
</div>

<script>
// ── FLAVOR DATA ────────────────────────────────────────────────
const FLAVORS=[
  {name:'🍏 청사과',wax:['#b8f5c8','#4ec97a','#2a9050'],mal:['#ffe0a0','#ffbb30','#d08000'],unlock:0},
  {name:'🍓 딸기',  wax:['#ffc8d5','#e85d7a','#c0345a'],mal:['#fffaaa','#f5e040','#c8a000'],unlock:0},
  {name:'🍇 포도',  wax:['#e0c8f5','#9b59b6','#7d3c98'],mal:['#c8f5d0','#4ec97a','#2a9050'],unlock:5},
  {name:'🍑 복숭아',wax:['#ffd5b8','#ff9a6c','#e06030'],mal:['#d0f0ff','#60c0f0','#2080c0'],unlock:10},
  {name:'🍋 레몬',  wax:['#fffac0','#f0c800','#c9a000'],mal:['#ffc8e0','#f060a0','#c02070'],unlock:20},
  {name:'🫐 블루베리',wax:['#c0d4ff','#3c6fcd','#2450a0'],mal:['#ffd0b8','#ff8850','#d04818'],unlock:35},
];

// ── STREAK TIMEOUT (30초 안에 안 뿌시면 리셋) ──────────────────
const STREAK_TIMEOUT_MS = 30000;

// ── localStorage 저장/로드 ────────────────────────────────────
function saveState(){
  try{
    localStorage.setItem('waxpop_v1', JSON.stringify({
      crackCount,
      unlocked,
      currentFlavor,
      lastCrackTime: Date.now()
    }));
  }catch(e){}
}
function loadState(){
  try{
    const raw=localStorage.getItem('waxpop_v1');
    if(!raw) return;
    const s=JSON.parse(raw);
    crackCount = s.crackCount || 0;
    // 오늘 날짜 체크 — 날짜 바뀌면 카운트 리셋
    const saved = new Date(s.lastCrackTime||0);
    const now   = new Date();
    if(saved.toDateString() !== now.toDateString()) crackCount = 0;
    if(Array.isArray(s.unlocked)) s.unlocked.forEach((v,i)=>{ unlocked[i]=v; });
    // 향 잠금 해제 재검증 (count 기반)
    FLAVORS.forEach((f,i)=>{ if(crackCount>=f.unlock) unlocked[i]=true; });
    currentFlavor = s.currentFlavor || 0;
    if(!unlocked[currentFlavor]) currentFlavor=0;
    WAX  = FLAVORS[currentFlavor].wax;
    MALANG = FLAVORS[currentFlavor].mal;
  }catch(e){}
}

// ── STATE ──────────────────────────────────────────────────────
let crackCount=0,isFrozen=false,crackLevel=0,isCracking=false;
let audioCtx=null;
let pressX=130,pressY=130,pressFactor=0,isPressingDown=false;
let holdRafId=null,pressStart=0,holdProgress=0,lastCrackAt=0;
let py_last=130;
let streakCount=0;
let streakTimer=null;
let currentFlavor=0;
let WAX=FLAVORS[0].wax, MALANG=FLAVORS[0].mal;
const unlocked=[true,true,false,false,false,false];

// ── LOAD SAVED STATE ───────────────────────────────────────────
loadState();

// ── ELEMENTS ───────────────────────────────────────────────────
const scene=document.getElementById('scene');
const cv=document.getElementById('cv');
const c=cv.getContext('2d');
const statusEl=document.getElementById('status');
const cntEl=document.getElementById('cnt');
const hintEl=document.getElementById('hint');
const freezeBtn=document.getElementById('freezeBtn');
const piecesDiv=document.getElementById('piecesDiv');
const flashEl=document.getElementById('flash');
const streakEl=document.getElementById('streakNum');
const holdRingPath=document.getElementById('holdRingPath');

// 캔버스 논리 크기 (고정)
const W=260,H=260,CX=130,CY=130,R=116;
const RING_CIRC=2*Math.PI*128;

// 저장된 카운트 반영
cntEl.textContent=crackCount;
streakEl.textContent=streakCount;

// 향 선택 UI 반영
document.querySelectorAll('.fi').forEach(f=>f.classList.remove('sel'));
document.getElementById('fi'+currentFlavor).classList.add('sel');
// 잠금 해제 UI 반영
unlocked.forEach((v,i)=>{
  if(v){
    const fi=document.getElementById('fi'+i);
    fi.classList.remove('locked');
    fi.querySelector('.lock')?.remove();
  }
});
// 잠금 조건 표시
FLAVORS.forEach((f,i)=>{
  const ua=document.getElementById('ua'+i);
  if(ua && !unlocked[i]) ua.textContent=`${f.unlock}개~`;
});

// ── DRAW ───────────────────────────────────────────────────────
function getBallPath(px,py,pf){
  const segs=128,pts=[];
  const pdx=px-CX,pdy=py-CY;
  const pdist=Math.sqrt(pdx*pdx+pdy*pdy)||0.001;
  const pux=pdx/pdist,puy=pdy/pdist;
  for(let i=0;i<=segs;i++){
    const angle=(i/segs)*Math.PI*2;
    const ux=Math.cos(angle),uy=Math.sin(angle);
    const dot=ux*pux+uy*puy;
    let r=R;
    if(pf>0){
      const dw=0.52;
      const gauss=Math.exp(-(1-dot)*(1-dot)/(2*dw*dw));
      const dimple=dot>0?gauss*30*pf:0;
      const bulge=Math.max(0,-dot)**2*pf*7;
      r=R-dimple+bulge;
    }
    pts.push([CX+ux*r,CY+uy*r]);
  }
  return pts;
}

// 얼린 상태 서리 결정 그리기
function drawFrost(alpha){
  if(alpha<=0) return;
  c.save();
  c.globalAlpha=alpha;
  // 방사형 서리 패턴
  const crystals=[
    {x:CX-38,y:CY-42,len:22,branches:5,angle:-0.7},
    {x:CX+42,y:CY-30,len:18,branches:4,angle:0.5},
    {x:CX-46,y:CY+36,len:20,branches:5,angle:2.1},
    {x:CX+36,y:CY+44,len:17,branches:4,angle:-2.4},
    {x:CX-10,y:CY-58,len:15,branches:4,angle:1.5},
    {x:CX+52,y:CY+8, len:14,branches:3,angle:-0.2},
    {x:CX-52,y:CY-10,len:14,branches:3,angle:3.0},
    {x:CX+10,y:CY+60,len:15,branches:4,angle:0.9},
  ];
  c.strokeStyle='rgba(220,245,255,0.9)';
  c.lineWidth=1.2;
  c.lineCap='round';
  crystals.forEach(({x,y,len,branches,angle})=>{
    // 클리핑 범위 체크
    const dx=x-CX,dy=y-CY;
    if(Math.sqrt(dx*dx+dy*dy)>R-4) return;
    for(let b=0;b<branches;b++){
      const a=angle+(b/branches)*Math.PI*2;
      c.beginPath();
      c.moveTo(x,y);
      const ex=x+Math.cos(a)*len,ey=y+Math.sin(a)*len;
      c.lineTo(ex,ey);
      // 가지
      const mid=0.5;
      const mx=x+Math.cos(a)*len*mid,my=y+Math.sin(a)*len*mid;
      c.moveTo(mx,my);
      c.lineTo(mx+Math.cos(a+Math.PI*0.5)*len*0.38,my+Math.sin(a+Math.PI*0.5)*len*0.38);
      c.moveTo(mx,my);
      c.lineTo(mx+Math.cos(a-Math.PI*0.5)*len*0.38,my+Math.sin(a-Math.PI*0.5)*len*0.38);
      c.stroke();
    }
    // 중심 점
    c.beginPath();
    c.arc(x,y,1.8,0,Math.PI*2);
    c.fillStyle='rgba(200,238,255,0.95)';
    c.fill();
  });
  c.restore();
}

function drawBall(crackLv,frozen,px,py,pf){
  py_last=py;
  c.clearRect(0,0,W,H);

  // shadow
  c.save();
  c.shadowColor='rgba(0,0,0,0.18)';c.shadowBlur=24;c.shadowOffsetY=10+pf*4;
  c.beginPath();c.arc(CX,CY+4,R-pf*8,0,Math.PI*2);
  c.fillStyle='rgba(0,0,0,0.01)';c.fill();
  c.restore();

  const pts=getBallPath(px,py,pf);
  c.save();
  c.beginPath();
  pts.forEach(([x,y],i)=>i===0?c.moveTo(x,y):c.lineTo(x,y));
  c.closePath();c.clip();

  // malang
  const mg=c.createRadialGradient(CX-18,CY-22,8,CX,CY,R);
  mg.addColorStop(0,MALANG[0]);mg.addColorStop(0.5,MALANG[1]);mg.addColorStop(1,MALANG[2]);
  c.fillStyle=mg;c.fillRect(0,0,W,H);

  // wax / frost
  if(!frozen){
    const wg=c.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
    wg.addColorStop(0,WAX[0]);wg.addColorStop(0.42,WAX[1]);wg.addColorStop(1,WAX[2]);
    c.fillStyle=wg;c.globalAlpha=Math.max(0.15,1-crackLv*0.09);c.fillRect(0,0,W,H);c.globalAlpha=1;
  } else {
    // 얼음 그라디언트
    const fg=c.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
    fg.addColorStop(0,'#dff2ff');fg.addColorStop(0.38,'#8dcce8');
    fg.addColorStop(0.75,'#48a0d4');fg.addColorStop(1,'#1a68a8');
    c.fillStyle=fg;c.globalAlpha=Math.max(0.15,1-crackLv*0.09);c.fillRect(0,0,W,H);c.globalAlpha=1;
    // 반투명 서리 오버레이
    c.fillStyle='rgba(210,238,255,0.18)';c.fillRect(0,0,W,H);
    // 서리 결정
    drawFrost(0.72);
  }

  // dimple shading
  if(pf>0.04){
    const pdx2=px-CX,pdy2=py-CY,pd=Math.sqrt(pdx2*pdx2+pdy2*pdy2)||1;
    const pu=[pdx2/pd,pdy2/pd];
    const dc=Math.min(pd,R*0.8);
    const dentX=CX+pu[0]*dc*0.7,dentY=CY+pu[1]*dc*0.7;
    const dentR=36*pf+8;
    const dg=c.createRadialGradient(dentX,dentY,0,dentX,dentY,dentR);
    dg.addColorStop(0,`rgba(0,0,0,${0.26*pf})`);
    dg.addColorStop(0.5,`rgba(0,0,0,${0.10*pf})`);
    dg.addColorStop(1,'rgba(0,0,0,0)');
    c.fillStyle=dg;c.fillRect(0,0,W,H);
    const rg=c.createRadialGradient(dentX,dentY,dentR*0.5,dentX,dentY,dentR*1.15);
    rg.addColorStop(0,'rgba(255,255,255,0)');
    rg.addColorStop(0.65,`rgba(255,255,255,${0.16*pf})`);
    rg.addColorStop(1,'rgba(255,255,255,0)');
    c.fillStyle=rg;c.fillRect(0,0,W,H);
  }

  if(crackLv>0) drawCracks(crackLv,px,py);

  // shine
  const pdx3=px-CX,pdy3=py-CY,pd3=Math.sqrt(pdx3*pdx3+pdy3*pdy3)||1;
  const sOx=pf>0?(pdx3/pd3)*(-10*pf):0,sOy=pf>0?(pdy3/pd3)*(-10*pf):0;
  const sg=c.createRadialGradient(CX-34+sOx,CY-40+sOy,3,CX-8+sOx,CY-10+sOy,R*0.62);
  sg.addColorStop(0,'rgba(255,255,255,0.9)');sg.addColorStop(0.22,'rgba(255,255,255,0.25)');
  sg.addColorStop(0.5,'rgba(255,255,255,0.04)');sg.addColorStop(1,'rgba(255,255,255,0)');
  c.fillStyle=sg;c.fillRect(0,0,W,H);
  c.restore();
}

// ── RANDOMISED CRACK VORONOI ────────────────────────────────────
let currentCrackPoly=null;
function genCrackPoly(){
  const n=5+Math.floor(Math.random()*3);
  const angles=[];
  for(let i=0;i<n;i++) angles.push(Math.random()*Math.PI*2);
  angles.sort((a,b)=>a-b);
  const lines=angles.map(a=>{
    const len=R*(0.7+Math.random()*0.35);
    const wobble=(Math.random()-0.5)*0.3;
    return {
      pts:[
        [CX,CY],
        [CX+Math.cos(a+wobble)*len*0.5, CY+Math.sin(a+wobble)*len*0.5],
        [CX+Math.cos(a)*len, CY+Math.sin(a)*len]
      ]
    };
  });
  const branches=angles.slice(0,3).map(a=>{
    const blen=R*(0.3+Math.random()*0.3);
    const ba=a+(Math.random()-0.5)*0.8;
    const startDist=R*(0.3+Math.random()*0.3);
    return {
      pts:[
        [CX+Math.cos(a)*startDist, CY+Math.sin(a)*startDist],
        [CX+Math.cos(ba)*blen, CY+Math.sin(ba)*blen]
      ]
    };
  });
  return [...lines,...branches];
}

function drawCracks(lv,px,py){
  if(!currentCrackPoly) currentCrackPoly=genCrackPoly();
  const n=Math.min(lv,currentCrackPoly.length);
  c.save();
  c.lineCap='round';c.lineJoin='round';
  c.shadowColor='rgba(255,255,255,0.5)';c.shadowBlur=2;
  for(let i=0;i<n;i++){
    const cr=currentCrackPoly[i];
    c.beginPath();
    c.moveTo(cr.pts[0][0],cr.pts[0][1]);
    for(let j=1;j<cr.pts.length;j++) c.lineTo(cr.pts[j][0],cr.pts[j][1]);
    c.strokeStyle=`rgba(255,255,255,${0.88-i*0.04})`;
    c.lineWidth=i<5?2.6:1.5;
    c.stroke();
  }
  c.restore();
}

// ── RANDOMISED WAX PIECES ───────────────────────────────────────
function genPiecePolys(){
  const n=6+Math.floor(Math.random()*3);
  const angles=[];
  for(let i=0;i<n;i++) angles.push((i/n)*Math.PI*2+(Math.random()-0.5)*0.4);
  angles.sort((a,b)=>a-b);
  return angles.map((a,i)=>{
    const a2=angles[(i+1)%n];
    const r1=R*(0.55+Math.random()*0.35);
    const r2=R*(0.55+Math.random()*0.35);
    return [
      [0,0],
      [Math.cos(a)*r1, Math.sin(a)*r1],
      [Math.cos((a+a2)/2)*(R*0.9), Math.sin((a+a2)/2)*(R*0.9)],
      [Math.cos(a2)*r2, Math.sin(a2)*r2],
    ];
  });
}

function launchPieces(){

    if(isFrozen){

      p2.fillStyle=fg2;
    } else {
      const wg2=p2.createRadialGradient(CX-22,CY-26,6,CX,CY,R);
      wg2.addColorStop(0,WAX[0]);wg2.addColorStop(0.42,WAX[1]);wg2.addColorStop(1,WAX[2]);

    }
    p2.fillRect(0,0,W,H);
    const sg2=p2.createRadialGradient(CX-34,CY-40,3,CX-8,CY-10,R*0.6);

    p2.fillStyle=sg2;p2.fillRect(0,0,W,H);
    // 얼린 조각에 서리 표현
    if(isFrozen){
      p2.globalAlpha=0.55;
      p2.strokeStyle='rgba(220,245,255,0.9)';
      p2.lineWidth=1;
      const fx=CX+(Math.random()-0.5)*60,fy=CY+(Math.random()-0.5)*60;

        const ba=(b/4)*Math.PI*2;
        p2.beginPath();p2.moveTo(fx,fy);
        p2.lineTo(fx+Math.cos(ba)*14,fy+Math.sin(ba)*14);p2.stroke();
      }
      p2.globalAlpha=1;
    }
    p2.restore();
    p2.save();
    p2.beginPath();
    shape.forEach(([dx,dy],j)=>{if(j===0)p2.moveTo(CX+dx,CY+dy);else p2.lineTo(CX+dx,CY+dy);});
    p2.closePath();p2.strokeStyle='rgba(255,255,255,0.85)';p2.lineWidth=2;p2.stroke();
    p2.restore();

    const cx2=shape.slice(1).reduce((s,[dx])=>s+dx,0)/(shape.length-1);
    const cy2=shape.slice(1).reduce((s,[,dy])=>s+dy,0)/(shape.length-1);
    const angle=Math.atan2(cy2,cx2);
    const dist=80+Math.random()*100;

    const rot=(Math.random()-0.5)*80;

    pc.animate([
      {transform:'translate(0,0) rotate(0deg)',opacity:1},

    ],{duration:560,delay,easing:'cubic-bezier(0.12,0,0.65,1)',fill:'forwards'});
    setTimeout(()=>pc.remove(),580+delay);
  });
}

// ── AUDIO: 달걀 껍질 파열음 ────────────────────────────────────
// 실제 왁스볼 녹음 분석 기반:
//   - 지배 주파수: 3~6kHz (45~62%)
//   - 어택: 5~20ms (초고속, 즉각적)
//   - 엔벨로프: 불규칙 다중 파열 (단조롭지 않게)
//   - 저역 에너지 매우 낮음 (~4%)
function getAC(){
  if(!audioCtx) audioCtx=new(window.AudioContext||window.webkitAudioContext)();
  return audioCtx;
}

// 달걀 껍질 단일 크랙 펄스
// freq: 중심 주파수, decay: 감쇠 속도, amp: 진폭, t: 시작 시간
function shellCrack(ac, dest, freq, decay, amp, t){
  const dur = 0.12;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(2, len, ac.sampleRate);
  for(let ch=0; ch<2; ch++){
    const d = buf.getChannelData(ch);
    const pan = ch===0 ? 1.0 : (0.86 + Math.random()*0.08); // 미세 스테레오
    for(let i=0; i<len; i++){
      const tt = i/ac.sampleRate;
      // 달걀 껍질: 두 레이어
      // L1 — 얇은 껍질 충격: 매우 빠른 어택 (~5ms), 고음 위주
      const n1 = (Math.random()*2-1) * Math.exp(-tt * decay);
      // L2 — 파편 굴러가는 소리: 약간 길게 잔향
      const n2 = (Math.random()*2-1) * Math.exp(-tt * decay * 0.28);
      // 소프트 클리핑: 날카로운 포화감 (껍질의 딱딱함)
      d[i] = Math.tanh((n1*0.68 + n2*0.32) * 4.2) * pan;
    }
  }
  const src = ac.createBufferSource();
  src.buffer = buf;

  // 달걀 껍질 EQ: 3~6kHz 지배, 저역 컷
  const hp  = ac.createBiquadFilter(); hp.type='highpass';  hp.frequency.value=600;  hp.Q.value=0.8;
  const bp1 = ac.createBiquadFilter(); bp1.type='peaking';  bp1.frequency.value=freq; bp1.Q.value=0.7; bp1.gain.value=10;
  const bp2 = ac.createBiquadFilter(); bp2.type='peaking';  bp2.frequency.value=freq*1.25; bp2.Q.value=0.9; bp2.gain.value=6;
  const lp  = ac.createBiquadFilter(); lp.type='lowpass';   lp.frequency.value=9500; lp.Q.value=0.6;

  const g = ac.createGain();
  g.gain.setValueAtTime(amp, t);
  g.gain.exponentialRampToValueAtTime(0.001, t + dur);

  src.connect(hp); hp.connect(bp1); bp1.connect(bp2); bp2.connect(lp); lp.connect(g); g.connect(dest);
  src.start(t);
}

// playWageujeok = 최종 터짐 전용. 팡! 쾌감 극대화.
function playWageujeok(intensity, frozen){
  const ac = getAC(), now = ac.currentTime;

  // ── MASTER COMPRESSOR: 전체 사운드를 빵빵하게 ─────────────────
  const master = ac.createDynamicsCompressor();
  master.threshold.value = -6;
  master.knee.value = 2;
  master.ratio.value = 4;
  master.attack.value = 0.001;
  master.release.value = 0.08;
  master.connect(ac.destination);

  // ── A. 슈퍼 임팩트 베이스: 두꺼운 "팡!" 몸통 ─────────────────
  // 킥드럼식 스윕: 80Hz → 28Hz 피치 드롭
  const kickOsc = ac.createOscillator();
  kickOsc.type = 'sine';
  kickOsc.frequency.setValueAtTime(frozen ? 100 : 80, now);
  kickOsc.frequency.exponentialRampToValueAtTime(frozen ? 30 : 22, now + 0.25);
  const kickDistWave = new Float32Array(256);
  for(let i=0;i<256;i++) kickDistWave[i] = Math.tanh((i/128-1)*4.5);
  const kickCurve = ac.createWaveShaper();
  kickCurve.curve = kickDistWave;
  kickCurve.oversample = '4x';
  const kickG = ac.createGain();
  kickG.gain.setValueAtTime(0, now);
  kickG.gain.linearRampToValueAtTime(1.8 * intensity, now + 0.003);
  kickG.gain.exponentialRampToValueAtTime(0.001, now + 0.35);
  kickOsc.connect(kickCurve); kickCurve.connect(kickG); kickG.connect(master);
  kickOsc.start(now); kickOsc.stop(now + 0.38);

  // ── B. 공기 폭발 "팡!": 와이드밴드 노이즈 버스트 ──────────────
  const burstLen = Math.floor(ac.sampleRate * 0.04);
  const burstBuf = ac.createBuffer(2, burstLen, ac.sampleRate);
  for(let ch=0; ch<2; ch++){
    const d = burstBuf.getChannelData(ch);
    for(let i=0; i<burstLen; i++){
      const tt = i/ac.sampleRate;
      const env = tt < 0.002 ? tt/0.002 : Math.exp(-(tt-0.002)*55);
      d[i] = (Math.random()*2-1) * env * (ch===0?1:0.95+Math.random()*0.05);
    }
  }
  const burstSrc = ac.createBufferSource(); burstSrc.buffer = burstBuf;
  // 넓은 밴드 — 200Hz~8kHz
  const burstHP = ac.createBiquadFilter(); burstHP.type='highpass'; burstHP.frequency.value=200;
  const burstLP = ac.createBiquadFilter(); burstLP.type='lowpass';  burstLP.frequency.value=8000;
  const burstG  = ac.createGain(); burstG.gain.value = 2.2 * intensity;
  burstSrc.connect(burstHP); burstHP.connect(burstLP); burstLP.connect(burstG); burstG.connect(master);
  burstSrc.start(now);

  // ── C. 예리한 파열 에지: 껍질 쩍! ──────────────────────────────
  shellCrack(ac, master, frozen?5800:4200, frozen?72:55, 1.4*intensity, now);
  shellCrack(ac, master, frozen?4400:3200, frozen?65:48, 0.9*intensity, now+0.004);
  shellCrack(ac, master, frozen?3600:2600, frozen?58:42, 0.6*intensity, now+0.009);

  // ── D. 잔향 레이어: 파편 흩어짐 ─────────────────────────────────
  const tailLen = Math.floor(ac.sampleRate * (frozen?0.15:0.22));
  const tailBuf = ac.createBuffer(2, tailLen, ac.sampleRate);
  for(let ch=0; ch<2; ch++){
    const d = tailBuf.getChannelData(ch);
    for(let i=0; i<tailLen; i++){
      const tt = i/ac.sampleRate;
      d[i] = (Math.random()*2-1) * Math.exp(-tt*(frozen?24:16)) * (ch===0?1:0.88);
    }
  }
  const tailSrc = ac.createBufferSource(); tailSrc.buffer = tailBuf;
  const tailHP  = ac.createBiquadFilter(); tailHP.type='highpass'; tailHP.frequency.value=2800;
  const tailG   = ac.createGain();
  tailG.gain.setValueAtTime(0.55*intensity, now+0.008);
  tailG.gain.exponentialRampToValueAtTime(0.001, now+(frozen?0.18:0.28));
  tailSrc.connect(tailHP); tailHP.connect(tailG); tailG.connect(master);
  tailSrc.start(now+0.008);

  // ── E. 말랑이 퍽 튀는 저음 ───────────────────────────────────
  const sq = ac.createOscillator(); sq.type='sine';
  sq.frequency.setValueAtTime(frozen?55:72, now+0.010);
  sq.frequency.linearRampToValueAtTime(frozen?26:34, now+0.34);
  const sqLP = ac.createBiquadFilter(); sqLP.type='lowpass'; sqLP.frequency.value=240;
  const sqG  = ac.createGain();
  sqG.gain.setValueAtTime(0, now+0.008);
  sqG.gain.linearRampToValueAtTime(0.55*intensity, now+0.038);
  sqG.gain.exponentialRampToValueAtTime(0.001, now+0.38);
  sq.connect(sqLP); sqLP.connect(sqG); sqG.connect(master);
  sq.start(now+0.008); sq.stop(now+0.42);

  // ── F. 얼린 전용: 유리 링잉 ──────────────────────────────────
  if(frozen){
    const ring = ac.createOscillator(); ring.type='triangle';
    ring.frequency.setValueAtTime(6200, now);
    ring.frequency.exponentialRampToValueAtTime(2600, now+0.20);
    const ringG = ac.createGain();
    ringG.gain.setValueAtTime(0.28*intensity, now);
    ringG.gain.exponentialRampToValueAtTime(0.001, now+0.23);
    ring.connect(ringG); ringG.connect(master);
    ring.start(now); ring.stop(now+0.25);
  }
}

// 꾹 누르는 중간 크랙 — 부분 파열 느낌
function playMiniSnap(lv){
  const ac = getAC(), now = ac.currentTime;
  const master = ac.createGain(); master.gain.value=0.32; master.connect(ac.destination);
  // 레벨 올라갈수록 주파수·강도 증가
  const f1 = 2800 + lv*400;
  const f2 = f1 * 1.35;
  shellCrack(ac, master, f1, 95+lv*5, 0.20+lv*0.055, now);
  shellCrack(ac, master, f2, 85+lv*4, 0.12+lv*0.032, now+0.007);
}

// ── HOLD RING ──────────────────────────────────────────────────
function updateRing(p){
  const offset=RING_CIRC*(1-p);
  holdRingPath.style.strokeDashoffset=offset;
  if(p>0.01){
    const g2=Math.round(211-p*80);
    const b2=Math.round(153-p*100);
    holdRingPath.style.stroke=`rgba(52,${g2},${Math.max(30,b2)},${0.75+p*0.25})`;
  } else {
    holdRingPath.style.stroke='rgba(52,211,153,0)';
  }
}

// ── HOLD LOOP ──────────────────────────────────────────────────
function holdLoop(){
  if(!isPressingDown){holdRafId=null;return;}
  const elapsed=(performance.now()-pressStart)/1000;
  const total=isFrozen?0.85:1.55;
  pressFactor=Math.min(1,elapsed/0.20);
  holdProgress=Math.min(1,elapsed/total);
  updateRing(holdProgress);

  const intervals=isFrozen
    ?[0.14,0.28,0.42,0.55,0.66,0.78,0.88]
    :[0.16,0.32,0.48,0.62,0.73,0.83,0.91];

  for(let i=0;i<intervals.length;i++){
    const thr=intervals[i];
    if(holdProgress>=thr && lastCrackAt<thr && !isCracking){
      lastCrackAt=thr;
      if(i===intervals.length-1){triggerFullCrack();return;}
      crackLevel=i+1;
      playMiniSnap(crackLevel);
      if(navigator.vibrate) navigator.vibrate(12);
      const pre=['꽉 쥐어봐! 👊','금이 가고 있어! 🫧','좀 더! 💪','거의 다 됐어! 😤','터지기 직전! 🔥','으득... 💢','지금이야!! 💥'];
      setStatus(pre[Math.min(i,pre.length-1)]);
      spawnParticles(false);
    }
  }
  drawBall(crackLevel,isFrozen,pressX,pressY,pressFactor);
  holdRafId=requestAnimationFrame(holdLoop);
}

function startPress(px,py){
  if(isCracking)return;
  isPressingDown=true;pressX=px;pressY=py;py_last=py;
  pressStart=performance.now();holdProgress=0;lastCrackAt=0;
  cancelAnimationFrame(holdRafId);
  holdRafId=requestAnimationFrame(holdLoop);
}

function endPress(){
  if(!isPressingDown)return;
  isPressingDown=false;cancelAnimationFrame(holdRafId);holdRafId=null;
  updateRing(0);
  const startF=pressFactor,startT=performance.now();
  function spring(){
    const el=(performance.now()-startT)/1000;
    pressFactor=Math.max(0,startF*(1-el/0.22));
    drawBall(crackLevel,isFrozen,pressX,pressY,pressFactor);
    if(pressFactor>0.008)requestAnimationFrame(spring);
    else{pressFactor=0;drawBall(crackLevel,isFrozen,0,0,0);}
  }
  requestAnimationFrame(spring);
}

// ── STREAK 타이머 리셋 ─────────────────────────────────────────
function resetStreakTimer(){
  clearTimeout(streakTimer);
  streakTimer=setTimeout(()=>{
    if(streakCount>0){
      streakCount=0;
      streakEl.textContent='0';
      setStatus('스트릭 끊겼다... 다시! 😅');
    }
  }, STREAK_TIMEOUT_MS);
}

function triggerFullCrack(){
  isPressingDown=false;cancelAnimationFrame(holdRafId);holdRafId=null;
  pressFactor=0;updateRing(0);
  isCracking=true;crackCount++;cntEl.textContent=crackCount;
  streakCount++;streakEl.textContent=streakCount;
  currentCrackPoly=null;

  // 스트릭 타이머 재시작
  resetStreakTimer();

  playWageujeok(isFrozen?1.0:0.85,isFrozen);
  setTimeout(()=>{showMalang();launchPieces();},42);

  // shake — 더 강하게
  let sf=0;
  const seq=[[5,-4],[-7,5],[4,-5],[-5,4],[3,-2],[-2,2],[1,-1],[0,0]];
  function shake(){
    if(sf>=seq.length){scene.style.transform='';return;}
    const[sx,sy]=seq[sf++];
    scene.style.transform=`translate(${sx}px,${sy}px)`;
    setTimeout(shake,34);
  }
  shake();
  doFlash();spawnParticles(true);
  if(navigator.vibrate) navigator.vibrate([30,10,70,15,50,10,30,8,20]);
  setStatus(getMsg());

  checkUnlocks(crackCount);
  saveState();

  setTimeout(()=>{crackLevel=0;isCracking=false;holdProgress=0;lastCrackAt=0;currentCrackPoly=null;drawBall(0,isFrozen,0,0,0);},720);
}

// ── UNLOCKS ────────────────────────────────────────────────────
function checkUnlocks(n){
  FLAVORS.forEach((f,i)=>{
    if(!unlocked[i] && n>=f.unlock){
      unlocked[i]=true;
      const fi=document.getElementById('fi'+i);
      fi.classList.remove('locked');
      fi.querySelector('.lock')?.remove();
      const ua=document.getElementById('ua'+i);
      if(ua) ua.remove();
      showUnlockToast(f.name);
    }
  });
}
function showUnlockToast(name){
  const t=document.getElementById('unlockToast');
  document.getElementById('utEmoji').textContent=name.split(' ')[0];
  document.getElementById('utText').textContent=`${name} 잠금 해제!`;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2800);
}

// ── PARTICLES ─────────────────────────────────────────────────
function spawnParticles(full){
  const host=document.getElementById('pts');
  const rect=scene.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;
  // 민트·라임·하늘 계열 파티클 색상
  const wC=['#6ee7b7','#34d399','rgba(255,255,255,0.92)','#bef264','#a7f3d0'];
  const mC=[MALANG[0],MALANG[1],MALANG[2]];
  const n=full?34:7;
  for(let i=0;i<n;i++){
    const p=document.createElement('div');p.className='pt';
    const sz=full?(5+Math.random()*20):(3+Math.random()*8);
    const isWax=Math.random()>0.35;
    const col=isWax?wC[Math.floor(Math.random()*wC.length)]:mC[Math.floor(Math.random()*mC.length)];
    const br=isWax?`${Math.random()*30}% ${50+Math.random()*40}% ${Math.random()*30}% ${50+Math.random()*40}%`:'50%';
    p.style.cssText=`width:${sz}px;height:${sz*(isWax?.45+Math.random()*.45:1)}px;left:${cx}px;top:${cy}px;background:${col};border-radius:${br};opacity:1;box-shadow:0 2px 10px rgba(52,211,153,.22);`;
    host.appendChild(p);
    const angle=Math.random()*Math.PI*2;
    const dist=(full?90:28)+Math.random()*(full?160:62);
    const tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist;
    const dur=0.44+Math.random()*0.54;
    p.animate([
      {transform:'translate(-50%,-50%) scale(1) rotate(0deg)',opacity:1},
      {transform:`translate(calc(-50% + ${tx}px),calc(-50% + ${ty}px)) scale(0) rotate(${(Math.random()-.5)*220}deg)`,opacity:0}
    ],{duration:dur*1000,easing:'cubic-bezier(0.1,0,0.6,1)',fill:'forwards'});
    setTimeout(()=>p.remove(),dur*1000+60);
  }
}

function doFlash(){
  flashEl.style.opacity='.55';
  setTimeout(()=>{flashEl.style.opacity='0';},65);
}

const MSGS=[
  ['우드득! 🫧','아드득! ✨','쩌드득! 💥','와드득! 🔊','왁뿌! 🎉'],
  ['또 눌러봐! 👀','느낌 미쳤지? 😌','멈출 수 없어~ 😆'],
  ['중독됐어? 🤔','이게 바로 왁뿌볼! 🫧'],
  ['왁뿌볼 마스터 🏆','완전 ASMR 👂','ㅋㅋ 못 멈추겠어 😂']
];
function getMsg(){const t=Math.min(3,Math.floor(crackCount/5));const a=MSGS[t];return a[Math.floor(Math.random()*a.length)];}
function setStatus(m){statusEl.style.opacity=0;setTimeout(()=>{statusEl.textContent=m;statusEl.style.opacity=1;},128);}

// ── POINTER ────────────────────────────────────────────────────
function getPressPos(e){
  const rect=scene.getBoundingClientRect();
  const sx=rect.width/W,sy=rect.height/H;
  const cx=e.touches?e.touches[0].clientX:e.clientX;
  const cy2=e.touches?e.touches[0].clientY:e.clientY;
  return{x:(cx-rect.left)/sx,y:(cy2-rect.top)/sy};
}
scene.addEventListener('pointerdown',e=>{
  if(isCracking)return;
  const{x,y}=getPressPos(e);
  scene.setPointerCapture(e.pointerId);
  startPress(x,y);
});
scene.addEventListener('pointermove',e=>{
  if(!isPressingDown)return;
  const{x,y}=getPressPos(e);
  pressX=x;pressY=y;py_last=y;
});
scene.addEventListener('pointerup',()=>endPress());
scene.addEventListener('pointercancel',()=>endPress());
scene.addEventListener('touchstart',e=>e.preventDefault(),{passive:false});
scene.addEventListener('touchend',e=>e.preventDefault(),{passive:false});

// ── FREEZE ─────────────────────────────────────────────────────
function toggleFreeze(){
  endPress();isFrozen=!isFrozen;crackLevel=0;pressFactor=0;holdProgress=0;lastCrackAt=0;
  drawBall(0,isFrozen,0,0,0);
  if(isFrozen){
    freezeBtn.textContent='🌡️ 꺼내기';
    freezeBtn.style.background='linear-gradient(135deg,#fde68a,#fbbf24)';
    freezeBtn.style.color='#78350f';
    setStatus('❄️ 꽁꽁! 한 방에 쩌드득~');
    hintEl.textContent='얼리면 더 선명한 우드득!';
  } else {
    freezeBtn.textContent='❄️ 냉동실';
    freezeBtn.style.background='linear-gradient(135deg,#a7f3d0,#34d399)';
    freezeBtn.style.color='#064e3b';
    setStatus('녹았어~ 말랑말랑 🫧');
    hintEl.textContent='❄️ 얼리면 더 선명해요';
  }
}

// ── FLAVOR ─────────────────────────────────────────────────────
function openPop(){document.getElementById('popup').classList.add('open');}
function closePop(e){if(e.target===document.getElementById('popup'))document.getElementById('popup').classList.remove('open');}
function tryFlavor(i){
  if(!unlocked[i]){
    setStatus(`${FLAVORS[i].name.split(' ')[0]} ${FLAVORS[i].unlock}개 뿌시면 해금!`);
    document.getElementById('popup').classList.remove('open');return;
  }
  document.querySelectorAll('.fi').forEach(f=>f.classList.remove('sel'));
  document.getElementById('fi'+i).classList.add('sel');
  currentFlavor=i;WAX=FLAVORS[i].wax;MALANG=FLAVORS[i].mal;
  endPress();
  crackLevel=0;isCracking=false;pressFactor=0;holdProgress=0;lastCrackAt=0;currentCrackPoly=null;
  drawBall(0,isFrozen,0,0,0);
  document.getElementById('popup').classList.remove('open');
  setStatus('새 왁뿌볼! 눌러봐 🤜');
  saveState();
}

// ── RESET ──────────────────────────────────────────────────────
function resetBall(){
  endPress();
  crackLevel=0;isCracking=false;pressFactor=0;holdProgress=0;lastCrackAt=0;currentCrackPoly=null;
  piecesDiv.innerHTML='';drawBall(0,isFrozen,0,0,0);
  hintEl.textContent=isFrozen?'얼리면 더 선명한 우드득!':'❄️ 얼리면 더 선명해요';
  setStatus('새 왁뿌볼이야! 눌러봐 🤜');
}

// ── ONBOARDING ─────────────────────────────────────────────────
function dismissOnboarding(){
  document.getElementById('onboarding').classList.add('gone');
  setTimeout(()=>demoPress(),400);
}
function demoPress(){
  if(isCracking)return;
  let t=0;
  const DEMO_X=CX,DEMO_Y=CY+20;
  pressX=DEMO_X;pressY=DEMO_Y;py_last=DEMO_Y;
  const dur=600;
  function step(){
    t+=16;
    const prog=Math.min(t/dur,1);
    const pf=prog<0.5?prog*2:(1-prog)*2;
    pressFactor=pf;
    drawBall(0,isFrozen,DEMO_X,DEMO_Y,pf);
    if(prog<1)requestAnimationFrame(step);
    else{pressFactor=0;drawBall(0,isFrozen,0,0,0);setStatus('이렇게 꾹 눌러봐! 🤜');}
  }
  requestAnimationFrame(step);
}

// ── INIT ───────────────────────────────────────────────────────
drawBall(0,false,0,0,0);

</script>
